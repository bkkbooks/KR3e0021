body:
  text: 壽親養老新書巻三元鄒鉉續編太上玉軸六字氣訣黄廷山人鄒應博述道藏有玉軸經言五臟六腑之氣因五味薫灼不和又六欲七情積久生疾内傷臟腑外攻九竅以至百骸受病輕則痼癖甚則盲廢又重則喪亡故太上憫之以六字氣訣治五臟六腑之病其法以呼而自瀉出臟腑之毒氣以吸而自採天地之清氣以補之當日小驗旬日大驗年後萬病不生延年益筭衛生之寶非人勿傳呼有六曰呵呼呬嘘嘻吹也吸則一而已呼有六者以呵字治心氣以呼字治脾氣以呬字治肺氣以嘘字治肝氣以嘻字治膽氣以吹字治腎氣此六字氣訣分主五臟六腑也凡天地之氣自子至巳為六陽時自午至亥為六隂時如陽時則對東方勿盡閉牕戸然忌風入乃解帶正坐扣齒三十六以定神先攪口中濁津潄鍊二三百下候口中成清水即低頭向左而嚥之以意送下候汩汩至腹間即低頭開口先念呵字以吐心中毒氣念時耳不得聞呵字聲聞即氣麤反損心氣也念畢仰頭閉口以鼻徐徐吸天地之清氣以補心氣吸時耳亦不得聞吸聲聞即氣麤亦損心氣也但呵時令短吸時令長即吐少納多也吸訖即又低頭念呵字耳復不得聞呵字聲呵訖又仰頭以鼻徐徐吸清氣以補心亦不可聞吸聲如此吸者六次即心之毒氣漸散又以天地之清氣補之心之元氣亦漸復矣再又依此式念呼字耳亦不可聞呼聲又吸以補脾耳亦不可聞吸聲如此者六所以散脾毒而補脾元也次又念呬字以㵼肺毒以吸而補肺元亦須六次次念嘘字以㵼肝毒以吸而補肝元嘻以㵼膽毒吸以補膽元吹以㵼腎毒吸以補腎元如此者並各六次是謂小周小周者六六三十六也三十六而六氣徧臟腑之毒氣漸消病根漸除祖氣漸完矣次看是何臟腑受病如眼病即又念嘘嘻二字各十八徧仍每次以吸補之總之為三十六訖是為中周中周者第二次三十六通為七十二也次又再依前呵呼呬嘘嘻吹六字法各為六次並須呼以㵼之吸以補之愈當精䖍不可怠廢此第三次三十六也是為大周即總之為一百單八次是謂百八訣也午時屬隂時有病即對南方為之南方屬火所以却隂毒也然又不若子後已前靣東之為陽時也如早起牀上靣東將六字各為六次是為小周亦可治眼病也凡眼中諸證惟此訣能去之他病亦然神乎神乎此太上之慈㫖也略見玉軸真經而詳則得之師授也如病重者每字作五十次凡三百而六腑周矣乃潄鍊嚥液扣齒訖復為之又三百次訖復潄鍊嚥液扣齒如初如此者三即通為九百次無病不愈祕之祕之非人勿傳四時攝養論中有云春肝氣盛者調嘘氣以利之夏心氣盛者調呵氣以踈之秋肺氣盛者調呬氣以洩之冬腎氣盛者調吹氣以平之但言調此四氣而書中未詳及四氣之訣今舉曽叔祖樸庵炎詹集中玉軸六氣全文以明之黄玉牕云愛山袁倅得樸庵親𫝊每日子午夘酉四時行持六字密室中竹簾布帷隔風為上亦嘗得愛山親授口訣云食後將息法平旦㸃心訖即自以熱手摩腹出門庭行五六十步消息之中食後還以熱手摩腹行一二百步緩緩行勿令氣急行訖還牀偃臥顆蘇煎棗啜半升以下人參茯苓甘草等飲覺似少熱即以麥冬竹葉茅根等飲量性將理食飽不宜急行及走不宜大語逺喚人嗔喜臥睡覺食散後隨其所業不宜勞心力腹空即須索食不宜忍饑生硬黏滑等物多致霍亂秋冬間暖裹腹腹中微似不安即服厚朴生薑等飲如此將息必無横疾養性雞鳴時起就臥牀中導引訖櫛潄即巾正坐量時候寒温喫㸃心飯或粥若服藥先飯食服藥喫酒消息訖入静室燒香誦經洗雪心源息其煩慮良久事了即出徐徐步庭院散氣地濕即勿行但屋下東西步令氣散家事付與兒子不宜闗心平居不得嗔叫用力飲酒至醉並為大害四時氣候和暢之日量其時節寒温出門行三二里及三百二百步為佳量力行但勿令氣乏喘而已親故相訪間同行出遊百步或坐量力談笑纔得歡通不可過度耳人性非合道者焉能無悶須畜數百巻書易老莊等第一勤洗浣以香霑之身數沐浴令潔浄則神安道勝也左右供使之人得清浄子弟小心少過謙謹者自然事閒無物相惱令人氣和心平凡人不能絶嗔若用無理之人易生嗔怒妨人導性二篇之㫖養衛得理皆沈存中懐山録所述存中名括安車輪不欲髙髙則摇車身長六尺可以臥也其廣合轍輞以索繫合之索如條大可也車上設四柱葢密簾竹織絹糊黒漆少加椶㯶重又蔽眼害於觀眺箱髙尺四寸設茵薦之外可以𨼆肘為法車後為門前設扶版加於箱上在前可慿在後可倚臨時移徙以鐡距子簮于兩箱之上版可濶尺餘令可容書策及肴樽之類箱下以版彌之臥則障風近後為窣户以備仄臥觀山也車後施油幰幰兩頭施軸如畫幀軸大如指有雨則展之傅於前柱欲障日障風則半展或偏展一邊臨時以鐵距子簮於車蓋梁及箱下無用則巻之立於車後車前為納陛令可垂足而坐要臥則以版梁之令平琴書酒榼扇帽之類挂車柱及葢間車後皆可也漢召申公以安車蒲輪閔子騫江革皆嘗為親御車邵康節詩云喜醉豈無千日酒惜花還有四時花小車行處人觀看滿洛城中都是家又云大子中消白日小車兒上看青天司馬温公崇徳待康節不至有詩云淡日濃雲合復開碧嵩清洛逺縈迴林端髙閣望已久花外小車猶未來康節和章亦有萬花深處小車來之句老人遊觀雅宜小車之適存中懐山録以安車為首云遊山具遊山客不可多多則應接人事勞頓有妨静賞兼僕衆所至擾人今為三人其諸應用物共為兩肩三人荷之操几杖持葢雜使更三人足矣肩輿者未預客有所攜則相照裁損無浪重複惟輕簡為便器皿皆木漆輕而逺盜惟酒盃或可用銀錢一二千使人腰之操几杖者可兼也行具二肩甲肩左衣篋一衣被枕盥潄具手巾足巾藥湯梳右食匱一竹為之二隔并底葢為四食盤子三每盤果子楪十矮酒榼一可容數升以備沽酒匏一盃三漆筒合子貯脯脩乾果嘉蔬各數品餅餌少許以備飲食不時應猝惟三食盤相重為一連其餘分任之暑月果脩皆不須攜乙肩竹篋二下為櫃上為虚隔左鬲上層書箱一紙筆墨硯剪刀韻略雜書册櫃中食椀楪各六七箸各四生果數物削果刀子右隔上層琴一竹匣貯之摺疊棊局一櫃中棊子茶二三品臘茶即碾熟者盞托各三瓢七等附帶雜物小斧子刀子劚藥鋤子蠟燭拄杖泥靴雨傘凉笠食銚虎子急須子油筒老人心閒無事每喜出遊康節詩所謂待天春暖秋凉日是我東遊西泛時也懐山録述遊山之具適用之宜倪尚書思經鋤堂雜誌記霅川城内外遊賞去處凡四十二所謂每月一遊則日日可度每嵗一遊則可閱三十年日日遊太頻勞費可厭嵗一遊太疎今酌其宜每月往一處遊一月之中又擇良辰美景具山殽野䔩或邀一兩賔無賔攜子弟同行庻疎數得中亦康節所謂遍洛陽城皆可遊也居山約余營兼山本以藏拙已就粗安可以忘歸諸兒之意眷戀挽留又難遽絶今與汝曹約每月二十日在山十日在家獨甚暑甚寒兩月則全在家恐山中不便也山中不可獨須子弟一人侍置厯輪流四子每人一旬周而復始其當旬者飲饍之類専一掌之其餘在家有效時新各隨其意多少不拘無亦不責其或有商議事合要來此不必當旬自宜前稟自六月為始各於旬下書名如當旬有私幹兄弟那容倪尚書之子祖仁祖義祖禮祖智祖信祖常祖常有最良之譽老人之性有喜山居者沈存中云山林深逺固是佳境獨往則多阻數人則喧雜必在人野相近心逺地偏背山臨流氣候髙爽土地良沃泉石清美如此得十畆平坦處便可葺居左右映帶岡阜形勝最為上地地勢好則居者安也締造規模從人意匠中門外作池可半畝餘種芰荷菱芡遶池岸種甘菊既可採又可觀賞欹牀如今之倚牀但兩向施檔齊髙合曲尺上平僧家亦有偏禪倚亦有仄檔然髙低不等難為仄倚若臂倚左檔則右檔可几臂倚右檔則左可几臂左右几互倚令人不倦仍可左右盤足或枕檔角欹眠無不便適其度座方二尺足髙一尺八寸檔髙一尺五寸從地至檔共髙三尺三寸木製藤綳或竹為之尺寸隨人所便増損飽食緩行初睡覺一甌新茗侍兒煎脫巾斜倚繩牀坐風送水聲來耳邊裴晉公詩也醉牀為牀長七尺廣三尺髙一尺八寸自半以上别為子靣歉大牀中間子靣廣二尺五寸長三尺皆木製韋綜之韋綜欲澁欲眠人身不退韋下虚二寸牀底以板彌之勿令通風子靣歉下與大牀平一頭施轉軸當大牀中間子靣底設一拐撐分為五刻子靣首掛一枕若欲危坐即撐起令子靣直上便可靠背以枕承腦欲稍偃則退一刻盡五刻即與大牀平矣凡飲酒不宜便臥當倚牀而坐稍倦則稍偃之困即放平而臥使一童移撐髙下如意不須闕以盡四體之適大牀兩縁有二尺餘前闕􅐎孔為直凡闕其下為筍欲倚手則歉闕􅐎孔中闕一牀便於佚老制度皆佳觀雪菴菴長九尺濶八尺髙六尺以輕木為格紙糊之三靣如枕屏風上以一格覆之靣前施夾幔中間可容小坐牀四具不妨設火及飲具隨處移行背風展之逈地即就雪中卓之比之氊帳輕而開濶不礙瞻眺施之别用皆可不獨觀雪也此菴即東坡之擇勝亭也東坡守汝隂作亭以帷幕為之世所未有銘略云乃作新亭筵楹欒梁鑿枘交設合散靡常赤油仰承青幄四張我所欲往十夫可將與水升降除地布牀又云豈獨臨水無適不臧春朝花郊秋夕月場無脛而趨無翼而翔敝又改為其費易償榜曰擇勝名實允當觀此銘則其製度可備見也子由亦云子瞻以幄為亭欲往即設不常其處名曰擇勝作四言一章轍愛其文故繼之略云我兄和仲塞剛立柔視身如𫝊苟完不求山磐水嬉習氣未瘳豈以吾好而俾民憂潁尾甚清潁曲孔幽風有翠幄雨有赤油匪舟匪車亦可相攸養老奉親者為之良可以供遊觀之適云蒲花槈九月掇蒲略蒸不爾則生蟲暴令燥投布囊中捋取花如栁絮者欲為坐褥或臥褥以帛為方囊滿實蒲花杖鞭令匀厚五六寸許其上復以褥表囊之虚軟温燠他物無比春間不御則褫去褥表出囊複亢燥處略暴之嵗嵗如此南方海閩中有木綿亦不及蒲花之柔暖湯鎗温酒為鐡銅鎗深三寸平底可貯二寸湯以酒盃排湯中酒温即取飲冬時擁爐静話免使僮僕紛紛殊益幽致羊羔酒米一石如常法浸漿肥羊肉七斤麴十四兩諸麴皆可將羊肉切作四方塊爛煮杏仁一斤同煮留汁七斗許拌米飯麴更用木香一兩同醖不得犯水十日熟味極甘滑此宣和化成殿方雪花酒羊精膂肉一斤去筋膜温水浸洗批作薄片用極好酒一升煮令肉爛細切研成膏别用羊骨髓三兩腎窠脂一兩於銀鍋内鎔作油去滓却入先研肉膏内并研令匀又入龍腦少許拌和傾入甆瓶内候冷每用時取出切作薄片入酒杯中以温酒浸飲之龍腦候極温方入如無腦入木香少許亦佳二味各入少許尤佳二酒宜為㫖甘之奉荼䕷酒好酒一斗用木香一塊以酒一盃於砂盆内約磨下半錢許用細絹濾入瓶密封包臨飲取荼䕷花英浮沉酒靣人不能辨杏花和露紅小蓓取十個去枝葉用生紗袋盛掛於瓶口近酒靣一寸許密封瓶口三兩日可飲或以黄柑皮旋滴汁數㸃於酒琖内亦佳此酒色香味三絶宜奉老人清興酴醿本酒名也世所開花元以其顔色似之故取其名唐書百官志良醖著令供酴醿酒今人或取花以為枕囊故黄山谷詩云名字因壺酒風流付枕幃香炭以精石炭屑之生葵葉雜搗為餅錢大暴乾焚香雖致冷濕地火亦不滅石炭相郡煤子最佳餘處者性急動之則火滅不得已清泉者次之長泉者又為下一法杉炭末五兩胡粉黄丹各一兩合擣為細末著糈米膠和匀作餅子候乾火内燒通紅以紙灰埋香爐中焚香經夕不滅不消降真香虚堂清夜宴坐焚之降真香一斤沉香四兩龍腦一分蜜和之茅香時燒少許亦佳本草云可入印香中合香附子末用四品竒香雪梅香丁香一分沉檀半脛炭篩研半兩來捻取些兒爐口爇人人道是雪中梅江梅香人人盡道是江梅半兩丁香一分茴更用藿零俱半兩麝香少許是良媒百花香一兩甘松二兩芎麝香少許蜜和同圓如彈子安爐上恰是百花凝曉風長春香二兩箋香三兩檀麝香腦子一錢寛華堂静處爐烟起清韻長春賽蕙蘭御愛四和香沈香檀香降真箋香茅香海螵蛸各一兩麝香二錢樟腦一錢半龍骨半兩蜜右諸香剉碎蜜和匀後用龍骨麝腦碾細和入新瓦瓶内封閉勿令氣出經三日方傾出限三日過遇四更時分當天取露氣天明便收隂乾如此三次研為末用蜜些子黄蠟調作餅子用甆器收遇燒時用水一盞傍香爐邊方燒香香方甚多獨此方用龍骨鎖住其煙不散所以為妙試茶採嫩芽先沸湯乃投芽煮變色挹取握去水小焙中焙欲乾鎗内略炒使香磨碾皆可坐圃臨泉旋擷旋烹芳新不類常韻香茶上春嫩茶芽每五百錢重以菉豆一升去殻蒸焙山藥十兩一處細磨别以腦麝各半錢重入盆同研約二千杵納罐内密封窨三日後可以烹㸃愈久香味愈佳栢湯方採嫩栢葉線繫垂桂一大甕中紙糊其口經月取如未甚乾更閉之至乾取為末如嫩草色不用甕只密室中亦可但不及甕中者青翠若見風則黄矣此湯可以代茶夜話飲之尢醒睡飲茶多則傷人氣耗精害脾胃栢湯甚有益如太苦則加少山芋尢佳外臺秘要有代茶新飲然作藥味不若栢湯隠居道話尤助幽尚三妙湯地黄枸杞實各取汁一升蜜半升銀器中同煎如稀餳每服一大七湯調酒調皆可實氣養血久服彌益人乾茘枝湯蔗糖一斤毬糖亦好大烏梅潤者二兩湯浸時復換水澄去酸汁不去核焙乾川桂去皮為末生薑二兩薄切作片焙乾右先將烏梅生薑為細末入在沙糖内與桂末拌和匀再取麤隔過如茶㸃喫欲作膏子喫烏梅用去核修事如上法不焙桂作小片為末薑切片不焙用水三盌煎至二碗湯調服暑熱心煩井水調服葉龍圖𫝊暑月可常合服之清韻湯縮砂仁二兩石菖蒲一兩甘草半兩右末入鹽㸃服橙湯橙子十個乾山藥一兩甘草二兩鹽四兩炒白梅四兩槌碎去仁核右先用橙子山藥甘草白梅一處研細揑作餅子焙乾為末入檀香半兩尢佳桂花湯黄桂花三斤㨂净去青柄研細以磁器盛貯覆合略蒸花乾薑一兩甘草一兩略炒右末和匀量入炒鹽盛貯莫令漏氣如常㸃服醍醐湯神曲二兩鹽十兩炒官桂二兩甘草七兩烏梅八兩洗拍碎乾薑二兩煨右先將五味焙乾為末後入炒鹽和匀作一處新甆罐收洞庭湯真橘皮四兩不去白去蒂擘作小錢大冷水浸一宿曬乾生薑四兩浄洗擦右將薑與橘皮同淹一宿曬乾焙乾入甘草一兩三錢炙黄好白鹽梅二十個去核以白麵拍作片子無油銚内煿乾入炒白鹽一兩半同一處為末沸湯㸃用木瓜湯生薑四兩取汁木瓜十兩白鹽五兩甘草五兩紫蘇十兩右炒薑鹽拌和蘇瓜甘草三日取出曬乾為末沸湯㸃服手足酸服之妙又一方加縮砂山藥炒為末消食化氣壯脾韻梅湯半黄梅百個槌去仁青椒四兩揀浄秤薑一斤去皮研甘草四兩炙為末鹽半斤右件安浄缽内一處拌匀烈日曬半月以色變稍紫為度更約度稀稠得所為佳須用曬半月日安浄瓶内㸃用已上諸方皆得之秘𫝊宜供湯藥之用熟水稻葉榖葉楮葉橘葉樟葉皆可採隂乾紙囊懸之用時火炙使香湯沃羃其口良久前朝太醫院定熟水以紫蘇為上沉香次之麥門冬又次之蘇能下胷膈滯氣功效至大炙蘇須隔竹紙不得飜候香以湯先泡一次傾却再泡用大能利氣極佳晨朝補養藥糜法地黄粥切地黄二合候湯沸與米同下鐺先取酥二合蜜一合同炒令香熟别貯之候粥欲熟乃下同煮取熟胡麻粥烏油麻去皮蒸一炊曝乾更炒令香熟每用白秔米一升胡麻半升如常煮粥法為之臨熟加糖蜜任意極香甘胡麻多治之臨時取用乳粥牛羊乳皆可先淅細秔米令精細控令極乾乃煎乳令沸一依用水法乃投米煮之候熟即挹置盌中每盌下真酥半兩置粥上令自鎔如油徧覆粥上食時旋攪美無比薯蕷粥薯蕷生於山者名山藥一名山芋薯蕷生山者佳圃種者無味取去皮細石上磨如糊每椀粥用薯蕷一合以酥二合蜜一合同炒令凝以匙揉碎粥欲熟投攪令匀乃出栗粥小栗去殻切如米粒每秔米一升栗肉二合同米煮更無他法百合粥生百合一升切蜜一兩同水窨熟投欲熟粥中每盌用三合麋角粥新麋角一具寸截流水内浸三日刷腥穢以河水入砂瓶或銀瓶内以桑葉塞瓶口勿令漏氣炭火猛煮時時㸔候如湯耗旋益熱湯一日許其角爛似熟山芋掐得酥軟即止未軟更煮慎勿漏氣漏氣則難熟取暴乾為粉其汁澄濾候清冷以綿濾作膠片盌盛風中吹乾麋角膠别入藥每粥一盌入麋角粉五錢鹽一匙同攪温服枸把子粥枸杞子生研捩取汁每一盌粥可用汁一盞加少熟蜜同煮馬眼粥新黒豆一斗浄淘入大釡中如常用水煮令熟擗取汁再入釡以熟麻油浸之豆上油深四指密葢之慢火煮直候露出豆即以匙拌轉更煮直令􅅹盡油即住每粥一釡可下熟豆三五盌欲熟入拌匀食之又法白米二升别煮令熟大顆黒豆一升先以薄灰汁煮豆令熟漉出豆却以清水燒沸依前入豆再煮透出灰氣漉出却以沙糖六兩用水兩碗化濾過入鹽二兩醬三兩只用水取醬汁同煮熟桃仁杏仁皆可為粥生去皮尖略炒令香細研水絞取濃汁隨意入粥中煮臨時加酥蜜亦可金罌术煎亦可作粥一入用糖法諸山蔬可作粥者皆只如菜粥法禮記内則言子事父母婦事舅姑進盥授巾之後問所欲而敬進之以饘酏為先饘厚粥酏薄粥也故此編詳述懐山録中諸藥糜法陸放翁云平旦粥後就枕粥在腹中暖而宜睡天下第一樂也紫不託法新黒豆煮取濃汗搜麵作湯餅極甘美能去麵毒令不蒸熱服丹石人尤宜食此雜蓴菜為羮妙沈存中云麵治壅熱益氣力但不可多食致令憤悶料理有法節而食之餺飥蒸餅及餻索餅起麵等法在食經中此法用黒豆汁搜麵則無毒矣造山藥麵法取山藥去皮薄切日中暴乾栁箕中挼為粉下篩如常麵食之加酥蜜為淳麵尤精益氣力長肌肉久服輕身耳目聰明不饑延年造乾地黄法九月末掘取肥大者去鬚熟蒸微暴乾又蒸暴乾食之如蜜可停芭蕉脯蕉根有兩種一種黏者為糯蕉可食取作手大片灰汁煮令熟去灰汁又以清水煮易水令灰味盡取壓乾乃以鹽醬蕪荑椒乾薑熟油胡椒等雜物研浥一兩宿出焙乾略搥令軟食之全類肥肉之味牛蒡脯十月以後取根洗乾去皮闕少煮勿太爛硬者即熟煮並搥令軟下雜料物如芭蕉脯法浥焙取乾笋脯一如牛蒡脯法蓮房脯取嫩蓮房去蒂又去皮闕入灰煮浥一如芭蕉脯法焙乾以石壓令匾作片收之薝蔔鮓詹蔔花即栀子也採嫩花醸作鮓極香美白樂天方劑劉禹錫饋以菊苗韲蘆菔鮓換取樂天六班茶二囊以自醒酒乾蕨菜採嫩蕨菜蒸熟以乾灰拌之同曝極乾濯去灰又曝乾收之臨食湯浸令軟味如合蕈石芥􆃡菜此二物極辛為菹大佳苦蓋菜苦蓋菜青蘘苦麻皆可作羮苦麻即今俗謂之胡麻者葉作羮大甘滑其苗名青蘘松蘂去赤皮取嫩白者密漬之略燒令蜜熟勿太熟極香脆白芷蜜漬糟藏皆可食防風芽防風芽如臙脂色天門冬芽如馬椿芹菜芎芽又有蘼蕪枸杞芽菊芽荇菜水藻牛膝芽地黄嫩葉皆如常菜治之東坡詩云秋來霜露滿東園蘆菔生兒芥有孫我與何曾同一飽不知何苦食雞豚況藥菜之佳乎水苔立春前採嫩者淘澤令極浄其間多沙石蝶蟲取得壓乾只入鹽油完椒切薤白同入瓶中醸為醑醋浸食之甚佳又可油炒加鹽醬亦善瓜虀生甜𤓰㨂去未熟者每十斤隨瓣切開去穰不用就百沸湯綽過以鹽五兩匀擦飜轉豆豉末半升釅醋升半麫醬斤半馬芹川椒乾薑陳皮甘草茴香各半兩蕪荑二兩並為細末同瓜一處拌匀入甆瓮内醃壓於冷處頓之經半月後則熟瓜色明透絶類琥珀味甚香美菜虀大菘菜叢採十字劈裂萊菔取緊小者破作兩半同向日中曬去水脚二件薄切作方片如錢眼子大入浄罐中以馬芹茴香雜酒醋水等令得所調浄鹽澆之隨手舉罐撼觸五七十次密葢罐口置竈上温處仍日一次如前法撼觸三日後可供菜色青白間錯鮮潔可愛藕虀嫩藕梢隨意切作方塊如骰子大就蠏眼湯内快手綽上取牽牛花揉汁醃染片時投冷熟水中滌過控乾以馬芹鹽花泡湯入少醋加蜜作虀澄冷澆供之豆虀先取濕沙納甆器中以緑豆匀撒其上如種蓺法深桶覆藏室中勿令見風日一次掬水洒透竢其苗長可尺許摘取蠏眼湯綽過以料虀供之赤豆亦可種然不如緑豆之佳薺羮俗謂薺為東風菜方言訛而為公爹菜謂可以奉公爹也東坡與徐十三書云今日食薺極美天然之珍雖不甘於五味而有味外之美其法取薺一二升許浄擇入淘了米三合冷水三升生薑不去皮搥兩指大同入釡中澆生油一蜆殻當於羮靣上不得觸觸則生油氣不可食不得入鹽醋君若知此味則陸海八珍皆可厭也天生此物以為幽人山居之禄輒以奉𫝊不可忽也羮以物覆則易熱而羮極爛乃佳也本草薺和肝氣明目凡人夜則血歸於肝肝為宿血之臟過三更不睡則朝旦而色黄燥意思荒浪以血不得歸故也若肝氣和則血脉流通津液暢潤東坡嘗有詩云時遶麥田求野薺强為僧舍煮山羮陸放翁亦有詩云小着鹽醯助滋味微加薑桂助精神風爐歙缽窮家活妙訣何曽肯授人筍鱖東坡回錢穆父書云竹萌䝉佳貺取筍蕈菘心與鱖魚相和清水煮熟用薑蘆菔自然汁及酒三物等入少鹽漸漸欵洒之過熟可食不敢獨味此請依法作與老嫂共之老人有性善茹素不忍害物者菽水之奉在嘉蔬藥菜料理如法殊益於人杞菊芎术等苗嫩時採食之或煮或虀或炒或罨悉用土蘇鹹豉汁加鹽下飲甚良蔓菁作虀最妙不斷五辛者春秋嫩韭四時採薤甚益緑豆紫蘇烏麻須宜貯俱能下氣其餘䜴醬之徒食所不可少皆須貯蓄肉食心不害物但以錢買猶愈於殺第一戒慎勿殺然肉須新鮮似有氣息則不宜食爛臟損氣切須慎之戒之種埴庭檻園林間種植可愛翫之物如世間花果人家自有此不悉載令抄東坡一書誠齋一詩于左東坡與程全父書白鶴峯新居成從天侔求數色果木太大則難活小則老人不能待當酌中者又須土碪稍大不傷根者柑橘柚茘枝楊梅枇杷松柏含笑栀子漫寫此數品不必皆有仍告書記其東西誠齋三三徑詩東園新開九徑江梅海棠桃李橘杏紅梅碧桃芙蓉九種花木各植一徑命曰三三徑其詩云三徑初開是蔣卿再開三徑是淵明誠齋奄有三三徑一徑花開一徑行歐陽公示謝道人種花詩云淺深紅白宜相間先後仍須次第栽我欲四時攜酒去莫教一日不花開西園胡大壯一喜種花卉以窺造化生育之妙喜飲醇酎以寓經綸燮理之方芸香古人藏書謂之芸香是也採置書帙中即去蠧置席下去蚤虱栽園庭間香聞數十步極可愛葉類豌豆作小聚生秋間葉上微白如粉江南人謂之七里香江南極多大率香草多只是花過則已縱有葉香者須採掇嗅之方香此草逺在數十步外此間已香自春至秋不歇絶可翫也茅香閒地種之可洗手終日香一年數次刈閒屋中時時燒少許亦佳本草云苗葉可煮作浴湯令人身香同藁本尢佳仍入印香中合香附子用枸杞㨂好地熟斸加糞訖然後逐畦長開壠深七八寸令寛乃取枸杞連莖剉長四寸許以草為索慢束如羮盌大於壠中立種之每束相去一尺下束訖别調爛牛糞稀如麵糊灌束子上令滿減則更灌然後以肥土壅之滿訖土上更加熟牛糞然後灌水不久即生乃如翦韭法從一頭起首割之得半畆料理如法可供數人其割時與地面平髙留則無葉深翦則傷根割仍避熱及雨中但早朝為佳又法但作束子掘坑方一尺深於束子三寸即下束子訖著好糞滿坑填之以水沃糞下即更著糞填以不減為度令糞葢束子一二寸即得生後極肥嫩數鋤壅每月一加糞尢佳又法但畦中種子如種菜法土糞下水當年疎瘦二年以後悉肥勿令長苗即不堪食如食不盡即剪作乾菜以備冬中常使如此從春及秋其苗不絶取甘州者為真葉厚大者是有刺葉小者是白棘不堪服食又法枸杞子於水盆内挼令散訖暴乾斸地作畦畦中去却五六寸土勿作壠縛草穰作稕似臂長短即以泥塗稕令徧以安壠中即以子布泥上一靣令稀稠得所乃以細土葢之令徧又以爛牛糞葢上令徧又布土一重令與畦平待苗出時時澆灌及堪採即如翦韭法更不要煮鍊每種用二月初一每年但五度翦不可過也凡枸杞生西河郡谷中及甘州者其味逈過於蒲萄今蘭州西去鄴城靈州九原並大根莖尢大甘菊移根最佳若少時折取苗乗雨濕種便活一年之後落徧地長服却老冬中收子翦如韭法陸龜蒙杞菊賦云惟杞與菊偕寒互緑或頴或苕煙披雨沐我衣敗綈我飯脫粟羞慚齒牙苟且粱肉蔓延駢羅其生實多爾杞未棘爾菊未莎其如予何其如予何東坡云天隨生自言常食杞菊及夏五月枝葉老梗氣味苦澁猶食不已余守膠西與通守劉君循古城廢圃求杞菊食之捫腹而笑作後杞菊賦云人生一世如屈伸肘何者為貧何者為富何者為美何者為陋或糠覈而瓠肥或粱肉而黑瘦何侯方丈庾即三韭較豐約於夢寐卒同歸於一朽吾方以杞為粱以菊為糗春食苗夏食葉秋食花實而冬食根尚庻幾乎河西南陽之壽張南軒賦云張子為江陵之數月時方仲春草木敷榮經行郡圃意有所欣爰命採掇付之庖人汲清泉以細烹屏五味而不親甘脆可口蔚其芬馨盡日為之加飯而他物不足以前陳又云天壤之間孰為正味厚或腊毒淡乃其至猩唇豹胎徒取詭異山鮮海錯紛糾莫計苟滋味之或偏在臟腑而成贅惟杞與菊微勁不苦滑甘靡滯非若它蔬善嘔走水既瞭目而安神復沃煩而滌穢驕南陽於西河又頽齡之可制隨寓必有約居足恃雪消壤肥其茸葳㽔與子婆娑薄言掇之古銚瓦盆啜汁咀虀髙論唐虞詠歌書詩嗟乎微斯物孰同先生之歸於是相屬而歌殆日晏以忘飢地黄十二月耕地至正月可止三四遍細爬訖然後作溝溝濶一尺兩濶作一畦畦濶四尺其畦微髙而平硬甚不受雨水苗未生間得水即爛畦中又撥作溝溝深三寸取地黄切長二寸種於溝内訖即以熟土葢之其土厚三寸以上每種一畆用根五十斤葢土訖即取經冬爛草覆之候芽稍出以火燒其草令燒去其苖冄生葉肥茂根益壯自春至秋凡五六耘不得鋤八月堪採根至冬尢佳若不採其根太盛春二月當宜出之若秋採訖至春不復更種其生者猶得三四年但採訖比及明年耨耘而已參騐古法此為最良按本草二月八月採殊未窮物性也八月殘葉猶在葉中精氣未盡歸根二月新苗已生根中精氣已滋不如冬月採殊妙又與蒸暴相宜古人云二月八月非為種者將為野生當須見苗矣欲食葉但露㪚後摘取旁葉勿損中心正葉甚益人勝諸藥東坡詩云地黄飼老馬可使光鑒人吾聞樂天語喻馬施之身白樂天採地黄詩凌晨荷鍤去薄暮不盈筐攜來朱家門賣與白面即與君啖肥馬可使照地光願易馬殘粟救此苦飢膓我衰正伏櫪垂耳氣不振移栽附沃壤本草古稱地黄宜黄土今不然大宜肥壤虛地則根大而多汁蕃茂争新春沉水得穉根言以水沉而試之也日華子云浮者名天黄半浮半沉者名人黄沉者名地黄其沉者佳也重湯養陳薪於鼎釡水中更以噐盛水而煮謂之重湯投以東阿清阿膠出東阿其用皮有老少則膠有清濁和以北海醇崖蜜助甘冷山薑發芳辛山薑木名古方用术融為寒食餳寒食日研杏仁為酪以煮麥粥以餳沃之嚥作瑞露珍丹田自宿火渴肺還生津願餉内熱子一洗胷中塵五加取根深掘肥地二尺埋一根令沒舊㾗甚易活苗生從一頭翦取每翦訖鋤土壅之五加蓋天有五車之星精也金應五行人應五徳位應五方物應五車青精入莖有東方之液白氣入節有西方之津赤氣入華有南方之光𤣥精入根有北方之􅏁黄煙入皮有戊巳之靈五神鎮主相轉育成用之者真仙服之者反嬰久服輕身耐老明目下氣補中益精堅筋骨强志意五葉者良葉可作蔬菜食五月七月採莖十月採根隂乾張子聲楊建始王叔才于世彦皆服此酒得壽三百年有子二十人世世有得服五加酒散而獲延年者不可勝計或只為散以代湯茶而餌之驗亦然也青蘘胡麻苗也取八稜者畦中如菜法種之生苗為菜食秋間依此法種之甚滑美百合上好肥地加糞熟斸訖春中取根大劈取瓣於畦中如種蒜法五寸一瓣種之直作行又加糞灌水苗出即鋤四邊令絶無草春後㸔稀稠得所處更别移亦得畦中乾即灌水三年後其大如拳然後取食之又取子種亦得或一年以後二年以來始生甚遲不如種瓣黄精擇取葉參差者是真取根擘破稀種一年以後極稠種無得其苗香美可食苜蓿擇肥地斸令熟作壠種之極益人還須從一頭翦每翦加糞鉏土壅之合歡萱草也移根畦中稀種一年自稠春翦苗食如枸杞秋夏不堪食牛蒡取子畦中種種時乗雨即生若有水不候雨也地須加糞灼然後肥旱則沃水翦如上法菜中之尢益者但多種食苗及根莖益於人蓮子八九月取堅黒子瓦上磨尖頭直令皮薄取墐土作熟泥封如三指大長使帶頭兼重令磨須尖泥欲種時擲至池中重頭向下自能周正薄皮上易生數日即出不磨者率不可生藕春初掘取藕三節無損處種入深泥令到硬土榖雨前種當年有花藕可作粉其法取麤藕不限多少浄洗截㫁浸三宿數換水看灼然潔浄然後漉出碓中碎擣以新布絞取汁重擣取汁盡為度又以密布濾去麤惡物澄去清水如稠難澄以水攪之然後澄看水清即㵼去一如造米粉法雞頭雞頭粉取新熟者去皮熟擣實如上法菱角粉去皮如上法薑粉以生薑爛研捩汁如上法以和羮葛粉去皮如上法開胃止煩熱茯芩粉剉如彈子以水浸去赤汁如上法松栢粉春採嫩葉如上法須垂露採為之經宿則無粉如嫩草鬱鬱可愛脫果木生之果八月間以牛羊滓和土包其鶴膝處彼端幹相摟黄紋處如大柸以紙裹囊覆之麻繞令密緻重則以杖拄之任其發花結實明年夏秋間試發一包視之其根生則㫁其本埋土中其花實皆晏然不動一如巨木所結予在蕭山縣見山寺中橘木止髙一二尺實皆如拳大蓋用此術也大木亦可為之嘗見人家有老林檎木根巳蠧朽圃人乃去木本二三尺許如上法以土包之一年後土中生根乃截去近根處三尺許包入地後遂為完木凡種果木須望前種實多望後種實少百部山地種之如百合法多種為佳取根挼汁濯衣令不生虱仍潔白如用皂角也右自杞菊以次為粥為蔬為脯為粉須自種植充饒足用百部之種亦可為澣濯之供菖蒲石怪石竒峯以沙石器種之旦暮易水則茂水濁及有泥滓則萎一寸九節者服之可以烏髭輕身延年夜檠燈間置一兩盆可以收煙不薰人眼東坡詩云碧玉盌盛紅瑪瑙青盆水養石菖蒲曽茶山云牕明几浄室空虚盡道幽人一事無莫道幽人無一事汲泉承露養菖蒲文石清漪斯亦几案間良翫也相鶴相鶴不必如鶴經所説但取其標格立瘦唳聲清徹者為勝凡老鶴所生則氣韻清古三年頂赤則能唳細論其法頸欲細而長身欲人立而不横足欲瘦而節欲髙頸肥則類鴈身横則類鶩脛麤韻俗則類鸛聲濁體肥則類鵞皆下才也為雛食魚稻甚多老則食榖漸少甚老則不食惟華亭縣鶴窠村所出者為得地他處雖時有皆凡格也養處須有廣水茂木風月清曠之地嘗食生物則格韻髙野畜之樊籠餉以熟食則多肥濁而精彩羽毛日漸摧藏類乎雞矣養龜龜者壽物養庭檻中可以愛翫愈於觀他物尢宜畜山龜爾雅謂之攝龜者腹下殻能開合此龜啖蛇蛇甚畏之庭檻中養此龜則蛇不復至以至園圃中多畜之大能辟蛇兼此龜不賴水陸地畜之不失其性予在隨州時寓法雲寺之後有竹園常苦多蛇寺僧乃畜龜於園中自爾不復有蛇相鶴養龜二事皆懐山録所述收畫子弟遇好圖畫極宜收拾在前士大夫家有耕莘築巖釣渭浴沂荀陳徳星李郭仙舟蜀先主訪草廬王羲之㑹蘭亭陶淵明歸去來韓昌黎盤谷序晉廬山十八賢唐瀛洲十八學士香山九老洛陽耆英古今事實皆繪為圖可以供老人閒玩共賔友髙談人物山水花卉翎毛各有評品吟詠亦以廣後生見聞梅蘭竹石尢為雅致瑶池壽鄉圖慶壽近年有壽域圖備列歴代聖賢神仙耆壽者丹青粧㸃尤為竒玩王維字摩詰九嵗知屬辭擢進士工草隸善畫名盛於開元天寳間寧薛諸王待若師友畫思入神至山平水逺雲勢石色繪工以為天機所到别墅在輞川地竒勝與裴廸遊其中賦詩相酬為樂東坡云味摩詰之詩詩中有畫觀摩詰之畫畫中有詩秦太虗云余為汝南得疾臥直舎髙仲符攜輞川圖示余曰閲此可以療疾余本江海人得圖喜甚即使二兒從旁引之閲於枕上恍然若與摩詰入輞川度華子岡經孟城拗憩輞口莊泊文杏館上斤竹嶺並木蘭柴絶茱茰沜躡槐栢窺塵柴返於南北垞航歇湖戱栁浪濯奕家瀬酌金屑泉過白石灘停竹里館轉辛夷塢抵漆園幅巾杖履棊弈茗飲或賦詩自娱忘其身之匏繫於汝南也數日疾良愈龍眠居士李公麟字伯時能行草書善畫尢工人物人以比顧陸顧凱之陸知微晩年致仕歸老肆意於泉石間作龍眠山莊圖為世所寳韓子蒼題太乙真人蓮葉圖云太乙真人蓮葉舟脱巾露髪寒颼颼輕風為帆浪為檝臥看玊宇浮中流中流蕩漾翠綃舞穏如龍驤萬斛舉不是峯頭十丈花世間那得葉如許龍眠畫手老入神尺素幻出真天人恍然坐我水仙府蒼煙萬頃波粼粼玉堂學士今劉向禁直岧蕘九天上不須對此融心神㑹植青藜夜相訪觀畫之趣二事可參置琴朱文公琴贊云養君中和之正性禁爾忿慾之邪心乾坤無言物有則我欲與子鉤其深歐陽公云予嘗有幽憂之疾退而閒居不能治也既而學琴於友人孫道滋受宫聲數引乆而樂之不知疾之在其體也夫疾生乎憂者也藥之毒者能攻其疾之聚而不若聲之至者能和其心之所不平心而平不和者和則疾之忘也宜哉奉親者能琴時為親庭鼓一二操亦足以娱悦其意和平其心琴師六言云擘托抺挑打摘先後輕重疾徐最是一般妙處更要其人讀書斯亦子弟藏修息游之一益云延方士湖州東林沈東老能釀十八仙白酒一日有客自號回道人長揖於門曰知公白酒新熟逺來相訪願求一醉公見其風骨秀偉跫然起迎徐觀其碧眼有光與之語其聲清圓於古今治亂老莊浮圖氏之理無所不通知其非塵埃中人也因出酒器十數於席間曰聞道人善飲欲以鼎先為壽如何道人曰飲器中鍾鼎為大屈卮螺杯次之梨花蕉葉最小請戒侍人次第速斟當為公自小至大以飲之笑曰有如顧愷之食蔗漸入佳境也又約周而復始常易器滿斟於前笑曰所謂杯中酒不空也回公興至即舉杯常命東老鼔琴回浩歌以和之又嘗圍基以相娯止弈數子輒拂去笑曰秪恐棊終爛斧柯回公自日中至暮已飲數斗無酒色東老欲有所叩回公曰聞公自能黄白之術未嘗妄用且篤於孝義又多隂功此余每日所以來尋訪而將以發之也東老因叩長生輕舉之術回公曰四大假合之身未可離形而頓去東老攝衣起謝有以喻之回公曰此古今所謂第一最上極則處也飲將逹旦甕中所釀止留糟粕而無餘瀝回公曰乆不遊浙中今日為公而來當留詩以贈然吾不學世人用筆書乃就擘席上榴皮畫字題於庵壁其色微黄而漸加黒其詩云西鄰已富憂不足東老雖貧樂有餘白酒釀來縁好客黄金㪚盡為收書已而告别東老啟門送之天漸明矣握手並行至舎西石橋回公先度乗風而去莫知所適延名衲成都一僧誦法華經甚専雖經兵亂卒不能害忽一山僕至云先生請師誦經引行過溪嶺數重煙嵐中一山居僕曰先生老病起晚請誦至寳塔品見報欲一聼之至此果出野服杖藜兩耳垂肩焚香聴經罷入不復出以藤盤竹箸秫飯一盂把菊數甌無鹽酪美若甘露得襯錢一環僕送出路口問曰先生何姓曰姓孫問何名僕於僧掌中書思邈二字僧大駭僕遽失之三日山中尋求竟迷舊路歸視襯資乃金錢一百文也由茲一飯身輕無疾天禧中僧一百五十嵗矣後隠不見欵延方士談真誥時約名緇聴梵書二士共談必説妙法真有所遇豈不樂哉肅客朱文公晚年野服見客榜客位云滎陽吕公嘗言京洛致仕官與人相接皆以閒居野服為禮而歎外郡或不能然其㫖深矣某叨恩致事前此䝉賔客下訪初亦未敢援此遽以老人野逸自居近縁乆病難於動作遂以野服從事上衣下裳大𢃄方履比之凉衫自不為簡所便者束帯足以為禮解帯足以燕居且使窮鄉下邑復見京都舊俗之美亦補助風教之一端也又云衰病之餘不堪拜跪親舊相訪亦望察此非應受者並告權免庻幾還答不至闕禮羅鶴林云余嘗於趙季仁處見其服上衣下裳衣用黄白青皆可直領兩𢃄結之縁以皂如道服長與膝齊裳必用黄中及兩旁皆四幅不相屬頭帶皆用一色取黄裳之義也别以白絹為大帶兩旁以青或皂縁之見儕軰則繋帶見卑者則否謂之野服又謂之便服記事周益公云蘇子容聞人引故事必令人檢出處司馬温公聞新事即便抄録且記所言之人故當時諺曰古事莫語子容今事勿告君實司馬公對賔客無問賢愚長㓜悉以疑事問之有草簿數枚常致座間苟有可取隨手抄録或對客即書率以為常其書字皆真謹劉元城見時已有三十餘册曽祖南谷文靖公叔祖樸庵提刑皆有日記樸庵所記名長生厯有序云司馬温公日記凡十年作一袠一日之事無論善惡必載焉限以十年所以推一期進徳與否也夫子三十而立自是十年則有加於前矣至從心之時蓋渉歴四十年聖人所以密推熟察以自驗其道藝所造功力所成者至矣夫甲乙周而時已久矣時愈久而行愈進此聖人之所以為聖人也温公之袠豈其原亦出於此歟長生厯亦十年為一袠二老相訪周益公以宰相退休楊誠齋以秘書監退休為廬陵二大老益公嘗訪誠齋於南溪之上留詩云楊監全勝賀監家賜湖豈比賜書華回環自闢三三徑頃刻能開七七花門外有田供伏臘望中無處不煙霞却慙下客非摩詰無畫無詩只漫誇誠齊和云相國來臨處士家山間草木也光華髙軒行李能過李小隊尋花到浣花留贈新詩光奪月端令老子氣成霞未論藏去𫝊貽厥拈向田夫野老誇好事者繪以為圖誠齋題云平叔曽過魏秀才何如老子致元台蒼松白石青苔徑也不𫝊呼宰相來用魏野詩翻案也誠齋冢嗣東山先生伯子以集英殿修撰致仕家居年八十雲巢曽無疑益公門人也年尤髙嘗攜茶袖詩訪伯子其詩云褰衣不待履霜回到得如今亦樂哉泓頴有時供戯劇軒裳無用任塵埃眉頭猶自懐千恨興到何如酒一盃知道華山方睡覺打門聊伴茗奴來伯子和云雪舟不肯半塗回直到荒林意盛哉籬菊苞時披宿霧木犀香裏絶纎埃錦心繡口垂金薤月露天漿貯玉林八十仙翁能許健片雲得得出巢來其風味庶幾可亞前二老云二老相訪倡妍酬麗四詩可觀放翁詩云老人無一事有興即吟詩唱者和者皆須興到也儲書邵康節詩云花木四時分景致經書萬卷號生涯有人若問閒居處道徳坊中第一家歐陽文忠公六一堂記云琴一張棊一局酒一壺藏書一萬卷集録金石遺文一千卷以吾一翁老於此五者之間是為六一陸放翁書巢記云陸子既老且病猶不置讀書名其室曰書巢吾室之内或棲於櫝或陳於前或枕藉於牀俯仰四顧無非書者吾飲食起居未嘗不與書俱間有意欲起而亂書圍之至不得行輒自笑曰此非吾所謂巢者耶二公蓋儲書以旬佚其老者也丁度之祖顗盡其家貲以置書至八千卷且曰吾聚書多矣必有好學者為吾子孫度力學有守登服勤詞學科仕至參政曽子固平生嗜書家藏至六萬餘卷手自讎對白首不倦此儲書以遺其子孫者也孟子有賢父兄之言惟以書教子弟者而後為賢晉人有佳子弟之目惟從父兄之教而知書者而後為佳唐杜荀鶴詩云欺春只愛和醅酒諱老猶看夾註書放翁詩云燈前目力依然在且盡山房萬卷書歐公詩云至哉天下樂終日在書案家仲本云至樂莫如讀書至要莫如教子又云人家教子弟如養芝蘭然既積學以培植之又須積徳以澆灌之子弟儲書正以備侍旁檢閱陳后山左右圖書日以討論為務其志専欲以文章名後世夜與諸生㑹宿忽思一事必明燭繙閲得之乃已或以為可待旦者后山曰不然人情樂因循一放過則不復省矣故其學甚博而精尤好經術非如唐之諸子作詩之外他無所知魏衍昌世亦彭城人從后山學年五十餘見異書猶手自抄寫藏書數千卷云夀親養老新書卷三
