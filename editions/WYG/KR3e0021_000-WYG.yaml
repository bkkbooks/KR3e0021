front:
  text: 欽定四庫全書子部五
  hash: sha256:385bc2d94867d1b606f43bb11ebdc68a3a5579aafe48be2b02b9eb652717f689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0021_WYG_000-1a, image: WYG0738/WYG0738-0283a.png}
body:
  text: 夀親養老新書醫家類提要臣等謹案夀親養老新書四卷第一卷為宋陳直撰夲名養老奉親書第二卷以後則元大徳中泰寧鄒鉉所續増與直書合為一編更題今名直於元豐時為泰州興化令文獻通考載有直所著奉親養老書一卷而此夲則題曰養老奉親書其文互異然此夲為至正中浙江刋夲猶據舊帙翻雕不應標題有誤盖通考傳寫倒置也鉉號氷壑又號敬直老人書中稱其曾祖曰南谷叔祖曰樸菴以福建通志考之南谷為宋㕘知政事應龍樸菴為宋江西提刑應博皆有名於時據周應紫序稱為總管鄒君又稱其官中都時則鉉亦曽登仕版者特通志不載其行履不可詳考矣直書自飲食調治至簡妙老人備急方分為十五篇二百三十三條節宣之法甚備明髙濓作尊生八牋其四時調攝牋所録諸藥品大抵夲於是書鉉所續者前一卷為古今嘉言善行七十二事後兩卷則凡寢興噐服及饘粥藥石之宜更為賅具而附以婦人小兒良治諸方凡二百五十六條其中如祝夀詩詞連篇載入不免失於冗雜又叙述閒適之趣往往詞意纎仄採掇瑣碎明季清言小品實亦濫觴於此然徵引方藥類多竒秘於髙年頥養之法不無小補固為人子者所宜究心也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀壽親養老新書原序壽親養老之事著於諸儒記禮之書備矣然自後世觀之則猶有未備焉者何也二帝三王之世風氣渾淪人生其間性質醇厚故能平血氣於未定方剛之際全筋力於欲衰將老之時人子之愛其親因其康彊加以奉養為之安其寢處時其㫖甘娯其耳目心志即可使之燕佚怡愉全生而益壽則禮經所載謂之備可矣後世太樸日漓真元日散七情為沴六氣乗之壯或夭傷老宜尫弱孝子慈孫服勤左右寢膳調娯之外尤不能不唯疾之憂而求之禮經則不過曰痛癢抑搔而已若秦越人過雒之所為醫曽未見之省録顧得謂之備歟孝哉陳令尹迺能輯是書於千數百年之後而特詳於醫藥治療之方凡為四時調攝食治備急合二百三十有三焉斯亦備矣吾樵卿先哲太師文靖鄒公之曽孫敬直翁鉉推老老親親之念紬繹是書有年猶恨其説之未備也則又廣集前修嘉言懿行竒事異聞與夫藥石膳羞器服之宜於佚老者釐為三卷而方論所述愈益精詳是書始大備吾聞喬木故家壽基世積翁之髙祖叔祖二母夫人皆年過九十備極榮養今翁亦希年矣桂子蘭孫盈庭戲綵青山流水竹色花香鳩杖鸚杯蒼顔𤣥鬢見者謂不老地行仙葢是書驗於公家乆矣兹復不私其驗繡諸梓而公之且拳拳𨗳夫人以自飬之説夫能知自飬之飬而後能安享子孫之飬此吾於續書重歎翁用心之仁也仁者必壽繇是八十而師九十而相百嵗而定律令百世而與􅖴謀衍而為商大夫之八百曽元而下家慶一堂是書之驗將千嵗之日至而未止也詩曰永錫爾類又曰永錫難老請為翁三誦之時大徳丁未中元樵西麓危徹孫序堂上慈親八十餘堦前兒輩戲相呼㫖甘取足隨豐儉此樂人間更有無康節翁詩先人怡軒居士奉八十有三之母大書屏間時應紫方垂髫也既壯挾册從宜春通守鄒愛山宦游愛山愛其母施及塾賔所至令應紫侍七袠之母以行咸淳庚午寓上杭縣齋汀守劉審軒刋吕東萊辨志録應紫與寓目焉中間二則載春夏奉親事注云養老奉親書於是方知此書之名越二載壬申至宜春徧求於袁吉文獻故家咸無焉自後司馬倦遊意謂此書不可復得矣閱三十有餘載大徳己巳春總管冰壑鄒君緘其書眡余余手之不釋如獲隨珠和璧之寳口之不置如聆虞韶商頀之音已不勝其欣喜未幾復以其續編來示命名壽親養老新書其嘉言懿行雅事竒方前書所未有者燦然畢備又何如其喜也君自吾杉遷樵南重作文靖公故宅樓居髙明賸有園池亭館之勝經史圖書琴棋觴詠款親友於玉壺中諸郎諸孫珠聯玉立善能承順其志怡悦其心允謂人間至樂湖山院落雲月為家四時佳興自有癡樂堂樵南小隠二記新書鋟梓抑使世之養老奉親者同有此樂焉錫類之仁逺矣應紫雖不獲再遂寸草春暉之志而亦不忘於老萊斑衣之思君昔官中都時曽遇異人授以怡神養性之㫖故續書多述老人之所以自養者應紫之志喜葢充然有得於斯鵬鷃同遊亦惟曰各安其分云爾是年冬至節日同郡泰寜玉牎黄應紫徳夫敬書余家藏舊有養老奉親書其言老人食治之方醫藥之法攝養之道靡所不載余倣之以奉吾母范陽郡太夫人李氏食飲起居咸得其宜壽髙八旬而甚康健則此書有益於人子大矣然嵗月既深巻舒之乆字畫糢糊編簡脱落懼後之覽者不得其説思獲善本書而新之以貽後人求之數載弗果得每鬱鬱以為欠事至正辛巳夏五余叨承朝命備員浙東憲使訪諸婺郡庠教授李子貞得壽親養老書覩其篇帙節目比余舊本尤加詳備昔之鬱鬱者一旦豁然矣因自念曰與其得之難孰若𫝊之廣遂命工鋟梓於學宫庶天下後世皆得觀覽以盡事親之道云至正壬午中秋范陽張士𢎞載拜書
