body:
  text: 壽親養老新書卷四元鄒鉉續編保養安樂之道惟善保養者得之孟子曰我善養吾浩然之氣太乙真人曰一者少言語養內氣二者戒色欲養精氣三者薄滋味養血氣四者咽精液養臟氣五者莫嗔怒養肝氣六者美飲食養胃氣七者少思慮養心氣人由氣生氣由神住養氣全神可得真道凡在萬形之中所保者莫先於元氣攝養之道莫若守中實內以陶和將護之方須在間日安不忘危聖人預戒老人尤不可不慎也春秋冬夏四時隂陽生病起於過用五臟受氣蓋有常分不適其性而強云為用之過耗是以病生善養生者保守真元外邪客氣不得而干之至於藥餌往往招徠真氣之藥少攻伐和氣之藥多故善服藥者不如善保養康節先生詩云爽口物多終作疾快心事過必為殃知君病後能服藥不若病前能自防郭康伯遇神人授一保身衛生之術云但有四句偈須是在處受持偈云自身有病自心知身病還將心自醫心境靜時身亦靜心生還是病生時郭信用其言知自護愛康強倍常年幾百嵗服藥沈存中云人非金石況犯寒暑霧露既不調理必生疾病常宜服藥辟外氣和臟腑也平居服七宣丸鍾乳丸量其性冷熱虛實自求好方常服紅雪三黃丸青木香丸理中丸神明膏陳元膏春初冰解散天行茵蔯元散皆宜先貯之以防疾發忽有卒急不備難求其防危救急不可闕者伏火丹砂保精養魄尤宜長服伏火硫黃益氣除冷癖理腰膝能食有力小還丹愈疾去風伏火磁石眀目堅骨伏火水銀壓熱鎮心金銀膏養精神去邪氣如上方藥固宜留心其餘丹火須冀神助不可卒致有心者亦宜精懇或遇其真貯藥圓散皆以深筍沙合盛之勿用有油即受濕外為漆櫝櫝筍亦欲深深則濕氣難入櫝中夾灰淨磨之勿漆則不受潤更集繒纊為襆厚襆之更以氊冒櫝口縱有潤氣自縫中入亦為氊纊所收暑月三焙之遇雨則入煴室貯茶如此亦善藥璞新瓷罌盛蠟紙羃之懸於東簷楣上令常得晨日勿令沾兩久隂則一焙移置深室晴復出之數品同一罌可也喜蛀物用舊曽貯油麻罐淨拭置藥其中即不蛀煴閣南方暑兩時茶藥圖籍皮毛膠糊物弓劔色衣筆墨之類皆惡蒸溽悉可置在閣中若山居即依山為閣其高去地一文則不復有蒸潤閣中循壁為厨厨三層壁仍板彌之前後開忩梁上為長笎物可懸者懸於笎餘悉置格上天日明燥即大開門忩令納風日隂晦則密閉中設煴爐常令火氣鬱鬱然又法煴閣中布卧牀牀下新出窑炭實之乃置物牀上永不蒸潤更不須著火其炭至秋供燒明年復易新炭牀上慎不可卧卧者多病瘖屢有驗蓋為火氣所爍也又法有餘力則設一小閣子但去地盈文以上自無蒸矣集方凡人少長老其氣血有盛壯衰三等岐伯曰少火之氣壯壯火之氣衰蓋少火生氣壯火散氣況復衰火不可不知也故治法亦當分三等其少日服餌之藥於壯老之時皆須别處之陳令尹集方俱為老人備用今所續編亦皆據平日見聞為老人對證處方者品列之天下受拜平胃散常服溫養脾元平和胃氣寬中進食仍治脾胃不和膈氣噎塞嘔吐酸水氣刺氣悶脅肋虛脹腹痛腸鳴胸膈痞滯不美飲食川厚朴去粗皮陳橘皮湯洗不去穰甘草以上各三兩銼南京小棗二百枚去核切生薑和皮四兩薄切茅山蒼术五兩去皮未泔浸一宿銼右六味用水五升慢火煮乾搗作餅子日乾再焙碾為細末每二錢入鹽少許點如泄㵼每服三錢生薑五片烏梅二個鹽少許水一盞半煎八分服此藥人人常服獨此方煮透滋味相和而美與衆不同所以為佳老人尤宜服之易簡方縮脾飲草果烏梅縮砂甘草各等分乾葛白扁豆各減半老人加附子每服五錢水一碗生薑十片煎至八分浸以熟水令極冷暑月用此代熟水飲之極妙降氣湯老人虛氣上壅當間以生附子加生薑煎臨熟以藥汁濃磨沉香水再煎一沸服之尤為穩當調氣散老人寒疝作疼不可攻擊改為㕮咀每服二錢水一大盞生薑紫蘇鹽煎服或煎茴香鹽酒調下末子亦得養正丹年高人臟腑寒祕者尤宜服之來復丹老人寒祕悉能主之一法治老人寒氣入腹小便不通者用生薑半兩連根葉和泥蔥一莖鹽一捻豆豉五十粒爛研略炒盫臍中心作兩劑更易用之以利為度亦良法也震靈丹老人血痢白梅茶下紅圓子治大人小兒脾胃等患極有神效治病不能傷耗真氣應老人小兒妊婦皆可服之青州白圓子治一切痰涎為患常服有功咳嗽痰實咽喉作聲老人小兒皆宜服之豫家已刋易簡方大字本兹不贅述本方祕傳六和元益老扶羸助脾活血進美飲食第一平和之劑熟地黃十兩破故紙兔絲子白茯苓去黑皮曬山藥并同十兩曬乾胡桃五十顆須用贛州信豐産者佳右先將熟地黃破故紙兔絲子三味酒浸一宿次早甑上蒸日中曝乾九浸九蒸九曝候十分乾次和白茯苓山藥二味杵臼中舂令極細為末次用胡桃研爛和五味令勻用酒煮麵糊為丸如梧桐子大每服三十丸空心溫酒鹽湯下此方不犯鐡氣所以佳妙神仙不老丸不老仙方功效殊駐顔全不費工夫人參牛膝川巴戟蜀地當歸杜仲俱一味地黃生熟用兔絲柏子石菖蒲更添枸把皮兼子細末蜜丸梧子如早午臨眠三次服鹽湯溫酒任君須忌餐三白并諸血能使鬚烏髮亦烏人參新羅者須是團結重實滋潤去蘆頭刷洗淨焙乾薄切焙燥稱二兩川牛膝長三四尺而滋潤者去苗刷洗淨焙乾寸截用酒浸一宿焙燥稱一兩半川巴戟色黑紫沉重大而穿心者佳若色帶黃而浮輕者非刷洗淨焙乾細切刷酒浸一宿焙燥稱二兩川當歸大莖其稍如馬尾狀滋潤辛酒芬香者去蘆頭刷洗淨焙乾細切用浸一宿焙燥稱二兩杜仲截之多絲者削去粗皮只取其肉如取肉桂之法然後刷洗淨焙乾橫理銼之如豆用麥麩炒令絲斷色黑去麩别磨稱一兩半地黃冬節前取以水浸沉者為是去其浮者搗取汁浸令浹蒸畢焙乾如是者三色黑味甘為慶用時以生乾熟二種焙乾酒浸一宿漉出竹刀細切焙乾各稱一兩忌鐡器兔絲子小如芥子極堅硬者佳大而輕者非用新布繓起挪洗焙乾以酒浸一宿又添酒浸一宿漉出將溫湯淋去酒焙燥别磨稱二兩柏子仁色紅而滋潤者去殼取仁稱一兩細研臨時和入衆藥石菖蒲緊細節密者去毛刷洗淨焙乾未泔浸一宿再焙乾細切焙燥稱一兩枸把子色白而肥潤去蒂洗淨焙乾用酒浸一宿焙乾稱一兩地骨皮色黃入手輕者佳重者非略去浮皮淨洗焙乾薄切焙乾稱一兩右十二味選之貴精製之如法不可曬只用慢火焙若太燥則又失藥氣只八分乾即於風前略吹令冷熱相激便十分燥取淨稱分兩磨如細散煉白蜜以火日搜和入木石臼內搗數百杵圓如梧桐子大每日空心午間臨卧三次服每服七十粒鹽酒鹽湯任下忌食蔥白薤白蘆蔔豆粉及藕諸般血蓋藕能破血諸血能解藥力若三白調食亦無他止令人鬚髮返白耳合時忌穢觸并婦人孝子雞犬等見陳書林煜云此方非特烏髭髮且大能溫養榮衛補益五臟和調六腑滋充百脈潤澤三焦活血助氣添精實髓須是節欲使藥力相須乃見功效之速三仙丹又名長壽圖一烏二术三茴香久服令人夀命長善治耳聾并眼暗尤能補腎與膀胱順氣搜風輕腰膝駐顔活血鬢難蒼空心溫酒鹽湯下誰知凡世有仙方川烏頭一兩去皮尖銼作骰子塊用鹽半兩炒焚烈茴香三兩炒香蒼术二兩米泔浸一宿用竹刀刮去粗皮切片用蔥白一握共炒黃右為細末酒糊為九如梧子大每服五十丸空心食前溫鹽酒或鹽湯下一日兩服切忌諸血陳書林曄云先公晚年常服此飲啖倍進後見錢都倉年八十鬚鬢皆黑詢其所以云自三十嵗以後日進一服八仙丹治虛損補精髓壯筋骨益心智安魂魄令人悅澤駐顔輕身延年益夀閉固天癸伏火硃砂真磁石赤石脂代赭石石中黃禹餘糧六味并用醋淬乳香沒藥八味各一兩右為細末勻研極細糯米濃飲丸如梧桐子大或如豆大每服一粒空心鹽湯下有人年幾七旬夢漏羸弱氣惙惙然虛損得此方服之頓爾強壯精氣閉固飲食如舊草還丹延年益夀耐寒暑能雙修德行可登地仙補骨脂熟地黃逺志地骨皮牛膝石菖蒲右等分末酒糊為丸如梧桐子大每服三五十丸空心日午溫酒下鹽湯熟水亦可大治虛勞白濁乃翊聖真君降授與張真人方服之百日百病除二百日精髓滿視聽倍常神聰氣爽瘟疫不侵三百日步驟輕健鬢鬚如漆反老還童小丹益夀延年安寧神志魂魄流滋氣血脈絡開益智慧釋散風濕耳目聰明筋力強壯肌膚悅澤氣宇泰定熟地黃肉蓯蓉酒浸各六兩五味子兔絲子酒浸各五兩柏子仁别研石斛巴戟去心天門冬去心蛇牀子炒覆盆子各三兩續斷澤㵼人參山藥逺志去心炒焦山茱茰菖蒲桂心白茯苓杜仲銼炒絲斷各二兩天雄炮去皮臍稱一兩煉成鍾乳粉扶衰三兩續老二兩常服一兩氣完則拆去右為末蜜丸如梧桐子大食前酒服三十丸至五十丸忌五辛生蔥蕪荑餳鯉虛人多起去鍾乳倍地黃多忘倍逺志茯苓少氣神虛倍覆盆子欲光澤倍柏子仁風虛倍天雄虛寒倍桂心小便赤濁三倍茯苓一倍澤㵼吐逆倍人參此方補勞益血去風冷百病諸虛不足老人精枯神耗女子絶傷斷緒并皆治之交感丹俞居易之祖通奉云豫年五十一嵗遇鐡甕申先生授此祕術確志行持服食一年大有補益平日所服藥一切屏去而飲食嗜好不減壯嵗此藥之功大矣今年八十有五享天然之夀爰以祕方傳之世人普願羣生同登道果後有牙藥可同用之茯神四兩香附子一斤用新水浸一宿臼內鍤去毛炒令黃色右為細末煉蜜圓如彈子大每服一丸早晨細嚼用降氣湯下降氣湯茯神一兩香附子半兩製法如前甘草一兩半炙右為細末每服二錢沸湯點下前藥揩牙法香附子五兩修治如前法搗生薑四兩同掩一宿炒令焦黑青鹽二兩研細拌勻同上藥收右每夜臨卧以少許揩牙如常法神仙訓老丸昔有宣徽使在鍾南山路邉見村莊一婦人年方二八持杖責一老兒年約百嵗宣徽駐車令問何故婦人至車前云此老兒是妾長男宣徽怪之下車問其仔細婦人云適來責此長男為家中自有神藥纍訓令服不肯服至令老邁鬚髮如霜腰曲頭低故責之宣徽因懇求數服并方以歸常服延年益夀氣力倍常齒落再生髮白再黑顔貌如嬰兒生乾地黃熟乾地黃各五兩川椒十兩不去核牛膝五兩酒浸了為末大黑豆一升生用乾山藥五兩雌雄何首烏各十兩雌者白雄者赤雄者不碾肉蓯蓉五兩枸把五兩藁本十兩洗右將雌何首烏為末用水甑內旦辰蒸日出曬夜間露如此九蒸九曬九露數足焙焦為末酒糊丸如梧桐子大空心溫酒鹽湯下忌蘿蔔此藥性溫無毒治百病補下元光澤皮膚嬰兒亦可服之經進地仙丸凡丈夫婦人五勞七傷腎氣衰敗精神耗散行步艱辛飲食無味耳焦眼昏皮膚枯燥婦人臟冷無子下部穢惡腸風痔漏吐血㵼血諸風諸氣并皆治之川牛膝酒浸一宿切焙肉蓯蓉酒浸一宿切焙川椒去目附子炮已上各四兩木鱉子去殼地龍去土已上各三兩覆盆子白附子兔絲子酒浸研赤小豆天南星防風去蘆骨碎補去毛何首烏萆薢川羌活金毛狗脊去毛烏藥已上各二兩綿黃耆人參各一兩川烏炮白茯苓白术甘草各一兩右為細末酒煮麵糊為圓如梧桐子大每服三四十圓空心溫酒下陶隱居以此方編入道藏時有人母幼年得風氣疾久治不瘥五十餘年隱居處此方修合日進二服半年母病頓愈髮白返黑齒落再生至八十嵗顔色如少年人血氣筋力倍壯耳目聰眀其家老僕七十餘嵗竊服此藥遇嚴冬御絺葛履霜雪無寒色有别業去家七十里每使老僕往返不移時又能負重非昔時比幾成地仙八味丸劉戴花方老人常服延夀延年川巴戟一兩半酒浸去心用荔枝肉一兩同炒赤色去荔枝肉不用高良薑一兩銼碎用麥門冬一兩半去心用炒赤色為度去門冬川楝子二兩去核用降真香一兩銼碎同炒油出為慶去降真香吳茱茰一兩半去梗用青鹽一兩同炒後茱茰炮同用胡蘆巴一兩用全蝎十四個同炒後胡蘆巴炮去全蝎不用山藥一兩半用熟地黃同炒焦色去地黃不用茯苓一兩用川椒一兩同炒赤色去椒不用香附子一兩半去毛同牡丹皮一兩同炒焦赤色去牡丹皮不用右一處研為細末鹽煮麵糊為丸如梧桐子大每服四五十丸空心食前鹽湯下溫酒亦得此方溫平補肝腎清上實下分清濁二氣補暖丹田接華池真水三車不敗五漏不生熱不流於上膈冷不侵於脾胃令人耳目聰眀治積年冷病除纍嵗沉疴兼治遺精白濁婦人赤白帶下其效如神雙補丸劉上舍之祖在京師辟雍得史載之家傳方服此四十載享年八十七嵗熟地黃半斤補血兔絲子半斤補精右為細末酒糊為丸如梧桐子大每服五十丸人參湯下此方治下部虛冷平補不熱不燥氣不順沉香湯下心氣虛茯苓湯下心經煩燥酸棗仁湯下小便少車前子湯下小便多益智湯下二黃丸黃德延曰夫人心生血血生氣氣生精精盛則鬚髮不白顔貌不衰可以延年益算其夭閼者多由服熱藥性燥不能滋生精血也豫深燭此理以謂藥之滋補無出生熟二地黃天麥二門冬世人徒知服二地黃而不知以門冬為引導則服二地黃者徒過去爾生地黃生精血用天門冬引入所生之地熟地黃補血用麥門冬引入所補之地四味互相該説載於本草可考而知而又以人參為通氣之主使五味併歸於心藥之滋補無出於此生地黃熟地黃天門冬去皮麥門冬去心各一兩人參一兩右五味為末煉蜜為丸如梧桐子大每服三十丸至五十丸空心溫酒鹽湯下此方常服十日眀目十日不渴自此以往可以長生豫登真人之位此藥之功也扶羸黑白丹治年尊氣血虛耗精血少不能榮養經絡精神枯瘁行步戰悼筋脈緩縱目視茫茫黑丹用麋茸去牀骨皮毛酒浸一宿酥炙令黃又用鹿茸事治如麋茸之法各等分并為細末酒糊為丸如梧子大白丹用鐘乳粉一味糯米糊為丸右用此二丹雜之而服如覺血少即多用黑丹如覺氣不足即多用白丹溫酒或米飲吞下空心食前服史丞相常服此二丹還少丹西川羅赤腳方大補心腎治一切虛敗心神耗散筋力頓衰腰腳沉重肢體倦怠血氣羸乏小便昏濁服藥五日頗覺有力十日精神爽健半月氣稍壯二十日耳目聰明一月夜思飲食久服令人身體輕健筋骨壯盛怡悅顔色婦人服之姿容悅澤大暖子宫去一切等疾山藥牛膝酒浸一宿焙乾各二兩逺志山茱茰白茯苓五味子肉蓯蓉酒浸一宿切焙乾石菖蒲巴戟去心楮實子杜仲去粗皮薑汁并酒塗茴香各一兩枸把子熟乾地黃各半兩右為細末煉蜜入棗肉為丸如梧桐子大每服三十丸溫酒鹽湯下日進三服空心食前看證候加減用藥身熱加山梔子一兩心氣不寧加麥門冬子一兩精液少加五味子一兩陽氣弱加續斷一兩勝駿丸治老人元氣不足真氣虛弱及諸虛寒濕氣進襲手足拳攣屈伸不得筋脈不舒行步不隨常服益真氣壯筋骨治膚散一切風附子一枚重八九錢重去皮臍當歸一兩酒浸一宿天麻酒浸牛膝酒浸酸棗仁炒防風各一兩熟地黃酒浸沒藥别研木香不見火全蝎去嘴足稍尾羌活甘草炙檳榔萆薢炒蓯蓉酒浸破故紙巴戟各一兩木瓜四兩麝香二錢半别研乳香半兩别研右二十味除乳香沒藥麝香别研外搗羅為末用生地黃三斤淨洗研爛如泥入無灰酒四升爛煮如膏以前藥拌勻杵令堅每兩分作十丸每服一丸細嚼臨卧酒送下如服半月見效甚速無事人服此亦壯筋力行步如飛故名勝駿此藥専在地黃膏要熬得好惟春夏好合以有生地黃也若合半劑每味減半此方黃謙仲傳於永福陳學諭鱠韲散老人脾胃久弱飲食全不能進兩服主效王醫繼先進高廟方附子七個炮丁香藿香葉官桂木香各三錢人參半兩右為末每服二大錢以尋常辣糊虀半盞熱調服用匙挑服之薑黃散治老人脾泄鷹爪黃連一兩斷作小假生薑四兩淨洗和皮切作骰子塊右於銀器內同炒得薑焦黃色去薑以黃連碾為細末臘茶清調下二錢不拘時吳興沈漕德器傳通利散治老人祕澀和劑方嘉禾散須用廣州增城縣隨風子右每服三大錢水一盞半生薑三片棗二枚煎至七分入蜜一匙再煎去滓不拘時制帥劉尚書用光傳脾約丸治老人津液少大便燥小便澀其脾為約大黃二兩酒洗焙厚朴枳殼白芍藥各半兩麻子仁一兩微炒杏仁三分右為末蜜丸如梧桐子大每服二十丸溫水下加至三十丸磨積丸治老人磨滯積去浮腫厚朴白薑縮砂胡椒青皮蒼术麥芽陳茱茰肉桂不見火右用醋同鹽煮再焙乾為細末酒糊為丸如梧桐子大每服十元日午或臨睡香附子煎湯吞下橘皮湯亦得此方老幼常服快脾進食白芷丸治老人氣虛頭暈白芷石斛乾薑各一兩半細辛五味子厚朴肉桂防風茯苓甘草陳皮各一兩白术一兩一分右為細末煉蜜丸如梧桐子大每服三十丸清米飲下不飢不飽服邵致逺年八十有三有此疾得此方數服即愈楊吉老傳治眼昏夜光育神丸養神明育精氣主健忘益智聰心補血不壅燥潤顔色逺視移時目不䀮䀮臟腑調適久服目光炯然神宇泰定語音清徹就燈永夜眼力愈壯并不昏澀不睡達旦亦不倦怠服兩三月後愈覺神清眼眀志強力盛步履輕快體氣舒暢是藥之效常餌如飲食一日不可輟惟在修合洗濯潔淨藥材須件件正當不宜草率熟地黃洗晒乾酒浸逺志淨洗就砧上槌碎取皮去骨木牛膝去蘆免絲子淨洗晒乾以酒浸别研如泥枳殼淨洗去穰麩炒赤色地骨皮須自取淨洗淨砧上槌打取皮當歸淨洗晒乾焙亦得以上七味各等分逐一稱過分兩平除地黃兔絲子别器用酒浸其餘五味同銼細共入一鉢內或瓷甕內若每件十兩都用第一等無灰濃酒六升同浸三宿取出文武火焙乾須試火令得所不可太猛恐傷藥性十分焙乾搗羅為末以兩手拌令十分勻煉蜜為丸如梧桐子大每服空心鹽酒下三十丸加至四五十丸亦不妨若不飲酒鹽湯亦得但不如酒勝煉蜜法冬五滚夏六七滚候冷以紙貼惹去沫丸後都入微火焙少頃入甕收陳書林云黃牧仲司諫常服此藥晚年目視甚眀因傳其方李守愚取黑豆緊小而圓者侵晨以井花水吞二七粒謂之五藏榖到老視聽不衰本草云熟地黃麥門冬車前子相雜治內障眼有效屢試信然其法細搗羅蜜丸如桐子大三藥皆美搗羅和合異常甘香真竒藥也牢牙烏髭方紹定壬辰江淮趙大使尅復旴昭時納合行省相公名買住來金陵豫在趙監軍廳同會納合年逾七十鬢髮髭鬚皆不白質其所由謂吾國有行臺出典藩鎮髭鬚皓然數載歸朝而鬚髮皆黑人怪其異自序遇一方牢牙烏髭嵗久得效因傳其方却不言分兩續乙巳年會張經厯朝請始得分兩云紫壺溫尉序旱蓮草二兩半此草有二種一種是紫菊花爐火客用之此一種再就北人始識之本草中名鯉腸草孫真人千金方名金陵草浙人謂之蓮子草其子若小蓮蓬故也芝麻辛三兩此是壓油了麻枯餅是也訶子二十個并核銼不蛀皂角三鋌月蠶沙二兩青鹽三兩半蓋青鹽吾鄉少且貴價只以食鹽代之但藥力減少川升麻三兩半最治牙疼右為末醋打薄糊為丸如彈子大撚作餅子或焙或曬以乾為度先用小口瓷瓶罐子將紙筋泥固濟曝乾入藥餅在瓶內煻灰火中燒令煙出若煙淡時藥尚存性急取退火以黃泥塞瓶口候冷次日出藥旋取數丸旋研為末早晚用如揩牙藥以溫湯灌潄使牙藥時須少候片時方始灌潄久用功莫大焉烏髭方甚多此方頗為竒異故抄之吾祖知縣承議公家傳常用牢牙方荆芥不見火土芎細辛當歸右為末使時未可便用水潄須令藥氣入牙內良久方潄為佳常用至老牙不動搖東坡治脾節飲水説脾能母養餘臟養生家謂之黃婆司馬子微著天隱子獨教人存黃氣入泥丸能致長生太倉公言安榖過期不安榖不及期以此知脾胃令固百疾不生近見江南一老人年七十三狀貌氣力如四五十人問其所得初無異術但云平生習不飲湯水耳常人日飲數升吾日減數合但只沾唇而已脾胃惡濕飲少胃疆氣盛液行自然不濕或冒暑逺行亦不念水此可謂至言不煩周曼叔比得腫疾皆以利水藥去之中年以後一利一衰豈可數乎當及今無病時力養胃氣若土能制水病何由生向陳彥升云少時得此疾服當歸防已之類皆不效服金液丹炙臍下乃愈此亦固胃助陽之意但火力外物不如江南老人之術薑桂辣藥例能脹肺多為腫媒不可服陳書林云友人陳昊卿年六十二面色光澤扣之以何道致此云常時絶不飲湯水雖羮汁亦少呷參以坡公之説方審昊卿之言為信飲食用暖王玠密人嘗食道傍有一老人進言飲食須用暖蓋脾喜溫不可以冷熱犯之惟暖則冷熱之物至脾皆溫矣又因論飲食太冷熱皆傷隂陽之和朝氏客語戒夜飲説酒古禮也奉祭祀會賓親製藥餌禮有不可缺者用之有時飲之有度豈可以為常而不知節哉禮經賓主百拜而酒三行者蓋重其道而不容輕故爾豈令人浮沉於其中乎豫家祖父處世養生惟務淡薄皆享年八九十上下豫自幼年性喜恬退今又七十餘矣飲酒止一二盞才夜即睡明早即起居常既罕病且康健亦自知節戒之功然也人生天地間貧賤者多貴而富豈易得哉倘能戒夜飲順隂陽正寤寐保精氣使一身神識安寧百邪不侵安享天年豈不幸歟好生君子審而察之此序見東氏經驗方不記何人所作擦湧泉穴其穴在足心之上濕氣皆從此入日夕之間常以兩足赤肉更次用一手握指一手磨擦數目多時覺足心熱即將腳指略略動轉倦則少歇或令人擦之亦得終不若自擦為佳陳書林云先公每夜常自擦至數千所以晚年步履輕便僕性懶每卧時只令人擦至睡熟即止亦覺得力鄉人鄭彥和自太府丞出為江東倉足弱不能陛辭樞管黃繼道教以此法踰月即能拜跪霅人丁邵州致逺病足半年不能下牀遇一道人亦授此法久而即愈令筆於册用告病者豈曰小補之哉東坡云揚州有武官侍真者官於二廣十餘年終不染瘴面色紅􅕹腰足輕快初不服藥唯每日五更起坐兩足相向熱磨湧泉穴無數以汗出為度歐公平生不信仙佛笑人行氣晚年云數年來足瘡一點痛不可忍有人傳一法用之三日不覺失去其法重足坐閉目握固縮榖道搖颭為之兩足如氣毬狀氣極即休氣平復為之日七八得暇即為乃般運捷法也文忠痛已即廢若不廢當有益又與王定國書云摩腳心法定國自巳行之更請加二不廢每日飲少酒調節飲食常令胃氣壯健湧泉穴在足心陷者中屈足卷指宛宛中足少隂脈所出為井地擦腎腧穴陳書林云余司藥市倉部輪羌諸軍請米受籌鄉人張成之為司農丞監史同坐時冬嚴寒余一二刻間兩起便溺問曰何頻數若此答曰天寒自應如是張云某不問冬夏只早晚兩次余諗之曰有導引之術乎曰然余曰旦夕當北面因暇専往叩請荷其口授曰某先為李文定公家壻妻弟少年遇人有所得遂教小訣臨卧時坐於牀垂足解衣閉氣舌柱上齶目視頂仍提縮榖道以手摩擦兩腎腧穴各一百二十次以多為妙畢即卧如是三十年極得力歸稟老人老人行之旬日云真是竒妙亦與親舊中篤信者數人言之皆得效今以告修鍊之士云東坡酒經南方之氓以糯與粳雜以卉藥而為餅嗅之香嚼之辣揣之枵然而輕此餅之良者也吾始取麵而起肥之和之以薑液蒸之使十裂繩穿而風戾之愈久而益悍此麴之精者也米五斗為率而五分之為二斗者一為五升者四三斗者以釀五升者以投三投而止尚有五升之羸也始釀以四兩之餅而每投以二兩之麴皆澤以少水足以散解而勻停也釀者必甕按而井泓之三日而井溢此吾酒之萌也酒之始萌也甚烈而微苦蓋三投而後平也凡餅烈而麴和投者必屢嘗而增損之以舌為權衡也既溢之三日乃投九日三投通十有五日而後定也既定乃注以斗水凡水必熟而冷者也凡釀與投必寒之而後下此炎州之令也既水五日乃篘得三斗有半此吾酒之正也先篘半日取所為羸者為粥米一而水三之揉以餅麴凡四兩二物并也投之糟中熟撋而再釀之五日壓得斗有半此吾酒之少徑者也徑正合為四斗又五日而飲則和而力嚴而猛也篘之不旋踵而粥投之少留則糟枯中風而致酒病也釀久者酒醇而豐連者反是故吾酒三十日而成也洪內翰曰此文如太牢八珍咀嚼不嫌於致力則真味愈雋永令附編與耆英喜文章者玩之歐公醉翁亭記用二十一也字此經用十六也字每一也字上必押韻暗寓於賦而讀之者不覺其激昂淵妙殊非世間筆墨所能形容也仲長統樂志論使居有良田廣宅背山臨流溝池環匝竹木周布埸圃築前果園樹後舟車足以代步涉之難使令足以息四體之役養親有兼珍之膳妻孥無苦身之勞良朋萃止則陳酒肴以娛之嘉時吉日則烹羔豚以奉之躊躇畦苑逰戲平林濯清水追涼風釣逰鯉弋高鴻風於舞雩之下詠歸高堂之上安神閨房思老氏之玄虛呼吸精和求至人之倣佛與達者數子論道講書俯仰二儀錯綜人物彈南風之雅操發清商之妙曲逍遙一世之上睥睨天地之間不受當時之責永保性命之期如是則可以陵霄漢出宇宙之外矣豈羡夫入帝王之門哉照袋王少保仁裕每天氣和暖必乘小駟從三四蒼頭攜照袋貯筆硯韻略刀子箋紙并小樂器之類名園佳墅隨意所適照袋以烏皮為之四方有蓋并襻五代士人多用之偶閲此事寓筆於兹視沈存中逰山之具尤為簡便處方人有常言看方三年無病可治治病三年無藥可用噫有是哉余近苦腳膝酸疼吕惠卿處以經進地仙丹連服三日而愈由是知天下無不可治之病醫書無不可用之方特在於遇醫之明不明耳地仙丹見前第十八方食治方凡飲養陽氣也凡食養隂氣也天産動物地産植物隂陽稟質氣味渾全飲和食德節適而無過則入於口達於脾胃入於鼻藏於心肺氣味相成隂陽和調神乃自生蓋精順五氣以為靈若食氣相惡則傷其精形受五味以成體若食味不調則傷其形隂勝則陽病陽勝則隂病所以謂安身之本必資於食不知食宜不足以存生古之别五肉五果五菜必先之五榖以夫生生不窮莫如五榖為種之美也苟明此道安腑臟資血氣悅神爽志平痾去疾何待於外求哉孫真人謂醫者先曉病源知其所犯以食治之食療不愈然後命藥陳令尹書食治之方已備續編糜粥之法已詳此卷所編諸酒諸煎諸食治方有草木之滋焉老人平居服食可以養夀而無病可以消患於未然臨患用之可以濟生而速效也食治諸方不特老人用之少壯者對證療病皆可通用負隂抱陽有生所同食味和調百疾不生保生永年其功則一真一酒米麥水三一而已此東坡先生真一酒也撥雪披雲得乳泓蜜蜂又欲醉先生真一色味頗類豫在黃州日所醖蜜酒也稻垂麥仰隂陽足器潔泉新表裏清曉日著顔紅有暈春風入髓散無聲人間真一東坡老與作青州從事名東坡云豫在白鶴新居鄧道士忽扣門時已三鼓家人盡寢月色如霜其後有偉人衣桄榔葉手攜斗酒丰神英發如吕洞賓曰子嘗真一酒乎就坐三人各飲數杯擊節高歌袖出一書授豫乃真一法及修養九事其末云九霞仙人李靖既出恍然桂酒楚辭曰奠桂酒兮椒漿是桂可以為酒也有隱居者以桂酒方教吾釀成而玉色香味超然非世間物也搗香篩辣入瓶盆盎盎春溪帶雨渾收拾小山藏社甕招呼明月到芳樽酒材已遣門生致菜把仍叨地主恩爛煮葵羮斟桂醑風流可惜在蠻村天門冬酒醇酒一斗六月六日麴末一升好糯米五升作飯天門冬煎五升米須淘訖曬乾取天門冬汁浸先將酒浸麴如常法候炒飯適寒溫用煎和飲令相入投之春夏七日勤看勿令熱秋冬十日熟庚辰嵗正月十二日天門冬酒熟豫自漉之且漉且嘗遂以大醉自撥牀頭一甕雲幽人先已醉竒芬天門冬熟新年喜麴米春香并舍聞菜圃漸疏花漠漠竹扉斜掩兩紛紛擁裘睡覺知何處吹面東風散纈紋山藥酒補虛損益顔色用薯蕷於砂盆中細研然後下於銚中先以酥一大匙熬令香次旋添酒一盞攪令勻空心飲之川人黃葛峰次辰冬月霜晨常以待客又方治下焦虛冷小便數瘦損無力生薯藥半斤刮去皮以刀切碎研令細爛於鐺中著酒酒沸下薯不得攪待熟著鹽蔥白更添酒空腹飲三二盞妙菖蒲酒通血脈調榮衛主風痹治骨立痿黃醫所不治者服一劑經百日顔色豐足氣力倍常耳目聰明行及奔馬髮白更黑齒落再生晝夜有光延年益夀久服得與神通菖蒲右搗絞取汁五斗糯米五斗炊熟細麴五斤搗碎相拌令勻入瓷器密蓋三七日即開每溫服一中盞日三又方菖蒲三斤薄切日中曬令極乾以絹囊盛之玄水一斗清者玄水者酒也懸此菖蒲密封閉一百日出視之如緑菜色以一斗熟黍米內中封十四日間出飲酒則三十六種風有不治者悉效又方菖蒲一斗細銼蒸熟生术一斗去皮細銼右二味都入絹袋盛用清酒五斗入不漏甕中盛密封春冬二七秋夏一七日取開每溫飲一盞日三令人不老強健面色光澤精神菊花酒壯筋骨補髓延年益夀耐老菊花五升生地黃五升枸把子根五斤右三味都搗碎以水一石煮出汁五斗炊糯米五斗細麴碎令勻入甕內密封候熟澄清每溫服一盞東坡云菊黃中之色香味和正花葉根實皆長生也又云仙姿高潔宜通仙靈紫蘇子酒紫蘇子一升微炒清酒三斗右搗碎以生絹袋盛納於酒中浸三宿少少飲之日華子云蘇子主調中益五臟下氣補虛肥健人潤心肺消痰氣枸把子酒眀目駐顔輕身不老堅筋骨耐寒暑療虛羸黃瘦不能食服不過兩劑必得肥充無所禁斷枸把子五升乾者搗生地黃切三升大麻子五升搗碎右先撈麻子令熟攤去熱氣入地黃枸把子相和得所納生絹袋中以酒五斗浸之密封春夏七日秋冬二七日取服多少任意令體中微有酒力醺醺為妙諺云去家千里勿食蘿摩枸杞此言其補益精氣強盛隂道久服令人長夀葉和羊肉作羮益人术酒术三十斤去黑皮淨洗搗碎以東流水三石於不漏器中漬之二十日壓漉去滓以汁於瓷器中盛貯夜間候流星過時抄自己姓名置於汁中如是五夜其汁當變如血旋取汁以浸麴如家醖法造酒酒熟任性飲之十日萬病除百日髮白再黑齒落更生面有光澤久服延年不老忌桃李蛤肉服此酒者真康節所謂頻頻到口微成醉拍拍滿懷都是春也蘇合香酒蘇合香丸有腦子者炙去腦子右用十分好醇酒每夜將五丸浸一宿次早溫服一杯除百病辟四時寒邪不正之氣舊酒尤佳醉鄉寶屑經進八仙散壯脾進食令人飲酒不醉宣和初華山貢士張老人號為鐡翁居士入山採藥遇道人在石巖坐共酌約有八人手中各出一物亦令張翁坐與少酒飲飲數杯各賜手中之物張翁熟視之乃八味藥也兼求其方名曰八仙銼散乾葛紋細嫩有粉者白豆䓻去皮殼縮砂仁實者丁香大者已上各半兩甘草粉者一兩百藥煎一分木瓜鹽窨加倍用燒鹽一兩右件八味共細銼人不能飲酒者只抄一錢細嚼溫酒下即能飲酒醉鄉寶屑無如此方之妙丁香餅子溫胃去痰解酒進食寬中和氣仍治積滯不消心腹堅脹痰逆嘔噦噫酢吞酸脅肋刺痛胸膈痞悶反胃惡心等證半夏湯泡二兩白茯苓去皮一兩丁香半兩不見火白术一兩炒川白薑一兩炮甘草一兩炙白扁豆用薑汁浸蒸熟焙一兩橘紅二兩去白膜汁浸一宿焙右為細末用生薑汁煮薄麵糊為餅如大碁子大每服一餅細嚼生薑湯下不以時柑皮散治酒毒煩渴或醉未醒柑子皮二兩洗焙乾右一味搗羅為散每服三錢七水一盞煎三五沸溫服或入少鹽末沸湯點未效再服石膏湯治飲酒過多大醉難醒石膏五兩葛根銼生薑細切各半兩右銼如麻豆大每服五錢七水二盞煎至一盞去滓溫服不拘時候解酒葛花一兩右搗為散沸湯點一大錢七不拘時亦可煎服又方葛根細銼作粗末每服三錢水一盞煎去滓溫服又方乾桑椹二合用酒一升浸一時久取酒旋飲之即解大寒凝海惟酒不冰酒大熱不可多飲邵康節詩又云斟有淺深存夑理飲無多少繫經綸在老人斟酌間何如耳諸煎地黃煎每年十月用生地黃十斤浮洗漉出一宿後搗壓取汁鹿角膠一大斤半生薑半斤絞取汁蜜二大升酒四升以文武火煎地黃汁數沸即以酒研紫蘇子濾取汁下之又煎二十沸已來下膠膠盡下酥蜜同汁煎良久候稠如餳貯潔器中凌晨取一匕以溫酒調服之東坡答滕達道書蒙惠地黃煎扶衰之要藥若續寄為幸又與翟東玉書云藥之膏油者莫如地黃啖老馬皆復為駒吾晚學道血氣衰耗如老馬矣欲多食生地黃而不可得也此藥以二八月採者良金櫻子煎經霜後以竹夾子摘取於木臼中轉柞却刺勿損之擘為兩片去其子以水淘洗過爛搗入大鍋以水煎不得絶火煎約水耗半取出澄濾過仍重煎似稀餳每服取一匙用暖酒一盞調服其功不可具載沈存中云金櫻子止遺泄取其溫且澀世之用者待紅熟取汁熬膏大誤也紅熟則却失本性今取半黃時採為妙十一月十二月採佳本草云療脾泄下痢止小便利澀精氣久服令人耐寒輕身方術多用之金髓煎枸把子不拘多少逐日旋採摘紅熟者去嫩蒂子揀令潔淨便以無灰酒於淨器浸之須是甕用酒浸以兩月為限用蠟紙封閉緊密無令透氣候日數足漉出於新竹器內盛貯旋於沙盆中研令爛細然後以細布濾過候研濾皆畢去滓不用即并前漬藥酒及濾過藥汁攪勻量銀鍋內多少升斗作番次慢火熬成膏切須不住手用物攪恐粘底不勻候稀稠得所然後用淨瓶器盛之勿令泄氣每早晨溫酒下二大匙夜卧服之百日中身輕氣壯積年不廢可以延夀茯苓煎白茯苓五斤去黑皮搗篩以熟絹囊盛於三斗米下蒸之米熟即止曝乾又蒸如此三過乃取牛乳二斗和合著銅器中微火煮如膏收之每食以竹刀割取隨性任飽服之則不飢如欲食先煮葵菜汁飲之任食無礙又方養老延年服茯苓方華山鋌子茯苓研削如棗許大令四方有角安於新瓷瓶內以好酒浸以三重紙封其頭候百日開其色當如餳糖可日食二塊百日後肌體潤澤服一年後可夜視物久久服之腸化為筋可延年耐老面若童顔本草茯苓補五勞七傷安胎暖腰膝開心益智止健忘忌醋及酸物補骨脂煎唐鄭相公為南海節度七十有五越地卑濕傷於內外衆疾俱作陽氣衰絶乳石補益之藥百端不應有訶陵國舶主李摩訶獻此方經七八日覺其功神驗自爾常服之其方用破故紙十兩揀洗為末用胡桃肉去皮二十兩研如泥即入前末更以好煉蜜和勻如飴盛瓷器中旦日以溫酒化藥一匙服之不飲酒者溫熟水化下彌久則延年益氣悅心明目補添筋骨但禁食藝薹羊血五味子煎五味子紅熟時採得蒸爛研取汁去子熬成稀膏量酸甘入蜜再火上待蜜熟俟冷器中貯作湯肺虛寒人可化為湯時時服作果可以寄逺五味皮肉甘酸核中辛苦有鹹味此則五味具也移門子服之十六年色如玉女入水不霑入火不灼本草云主益氣咳逆上氣勞傷羸瘦補不足強隂益精養五臟除熱生隂中肌入藥生曝不去子薄荷煎消風熱化痰涎利咽膈清頭目龍腦薄荷葉一斤川芎三兩桔梗五兩去蘆甘草四兩防風三兩縮砂仁一兩右為末煉蜜為劑此藥看之甚可忽用之大有功倉卒之中亦可應手解利治遍身麻痺百節酸疼頭昏目眩鼻塞腦痛語言聲重項背拘急皮膚瘙癢或生癮疹及治肺熱喉腥脾熱口甜膽熱口苦又治鼻衄唾血大小便出血及脫著傷風并沐浴後風并可服之兩眼暴赤腫痛可以生薄荷取汁更調此藥令稀貼兩太陽臨睡更貼上下兩眼臉次日即散治腸風下血可用此藥二貼和雪糕圓如梧桐子大作二服空心熟水下即止麥門冬飲東坡詩云一枕清風直萬錢無人肯買北忩眠開心暖胃門冬飲知是東坡手自煎本草云麥門冬根上子也安魂定魄止渴肥人治心肺虛熱并虛勞客熱頭痛亦可取苗作熟水飲之陶隱居云以四月採冬月作實如青珠根似穬麥故謂麥門冬以肥大者為好用之湯澤抽去心不爾令人煩甘露飲常服快利胸膈調養脾胃忺進飲食乾餳糟頭酢者六分生薑四分洗淨和皮右相拌搗爛捏作餅子或焙或曬令乾每十兩用甘草二兩炙同碾羅為末每服二錢入少鹽沸湯點不拘時候此方専治翻胃嘔吐不止飲食減少常州一富人病翻胃往京口甘露寺設水陸泊舟岸下夢一僧持湯一杯與之飲罷猶記其香味便覺胸膈少快早入寺知客供湯乃是夢中所飲者胸膈尤快遂求其方修製數十服後疾遂瘥名曰觀音應夢散豫得之常以待賓易名曰甘露飲在臨汀治一書吏旋愈切勿忽之糯米糕治小便數用純糯米糕一掌大臨卧炙令軟熟啖之仍以溫酒下不能飲溫湯下坐行良久待心間空便睡蓋糯稻能縮水凡人夜飲酒者是夜輒不尿此糯之力也又方有人渴用糯禾稈斬去穗及根取其中心淨器中燒作灰每用一合許湯一碗沃浸良久澄去滓乘渴頓飲之此亦糯稻縮水之力也杏仁粥杏仁二兩去皮失研豬肺一具去管和研令爛如糊右用瓦瓶煮粥令熟却將瓷碗放火上炙令熱以豬肺糊在碗內便㵼粥蓋之更以熱湯抵令熟後服之大能補肺氣人參粥人參半兩為末生薑取汁半兩右二味以水二升煮取一升入粟米一合煮為稀粥覺飢即食之治反胃吐酸水枸把葉粥枸把葉半斤細切粳米二合右二味於石器中相和煮作粥以五味末蔥白等調和食之燒肝散治男子婦人五勞七傷胸膈滿悶飲食無味腳膝無力大腸虛滑口內生瘡女人血氣并宜服之肉豆蔲三個和皮官桂香白芷當歸破故紙人參茯苓桔梗各半兩右為末每服四錢半羊肝四兩作片糝藥在上以紙褁後用南粉塗文武火煨熟米飲嚼下參歸腰子治心氣虛損人參半兩細切當歸半兩上去蘆下去細者取中假切豬腰子一雙右以腰子用水兩碗煮至一盞半將腰子細切入二味藥同煎至八分喫腰子以汁送下有喫不盡腰子同上二味藥滓焙乾為細末山藥糊為丸如梧桐子大每服三五十丸此藥多服為佳崑山神濟大師方獻張魏公丞相韓子常知府閣中服之有效平江醫者丁御幹謂葛樞密云此藥本治心氣怔忡而自汗者不過一二服即愈蓋竒藥也甲乙餅治痰喘嗽咳杏仁一兩去皮尖牡蠣粉一兩同杏仁炒黃色青黛一兩右研勻入蠟一兩鎔搜丸如彈子大揑作餅每用一餅合日柿中濕紙裹煨約藥鎔方取出火毒細嚼糯米飲送下茯苓麵東坡與程正輔書云舊苦痔疾二十一年今忽大作百藥不效欲休糧以清淨勝之而未能令斷酒肉與鹽酪醬菜凡有味物皆斷又斷粳米飯惟食淡麵一味其間更食胡麻茯苓麵少許取飽胡麻黑脂麻是也去皮九蒸曝白茯苓去皮入少白蜜為麵雜胡麻食之甚美如此服食多日氣力不衰而痔漸退又云既絶肉五味只知此麨及淡麵更不消别藥百病自去此長年之真訣但易知而難行爾蘿蔔菜治酒疾下血旬日不止生蘿蔔右一味揀稍大圓實者二十枚留上青葉寸餘及下根用瓷瓶取井氷煮令十分爛熟薑米淡醋空心任意食之立止用銀器重湯煮尤佳羊肺羮治小便頻數下焦虛冷羊肺一具細切羊肉四兩細切右二味入五味作羮空腹食之又方生山芋半斤削去皮小豆葉嫩者一斤右二味豉汁中入五味煮羮食之又方生山芋半斤削去皮薤白切一握右二味以䜴汁煮羮入五味如常法空腹食之又方生山芋半斤削去皮右拍碎慢火煎酒二升候酒沸旋下山芋入鹽椒蔥白空腹飲之百合治肺藏壅熱煩悶新百合四兩右用蜜半盞和蒸令軟時時含一棗大咽津服之黃精餌黃精耐老不飢其法可取甕子去底釡上安頓令得所盛黃精令滿密蓋蒸之令氣溜即暴之第二遍蒸之亦如此九蒸九暴凡生時有一碩熟有三四斗方好蒸之不熟則刺人咽喉既熟曝乾不爾朽壞食之甘美補中益氣安五藏潤心肺輕身延年飢嵗可以與老小休糧食療云根葉花實皆可食之但相對者是不對者名扁精不可食金櫻子丸補腎祕精止遺泄去白濁牢關鍵神妙金櫻子一升槌碎入好酒二升銀器內熬之候酒乾至一升以下去滓再熬成膏桑白皮一兩炒雞頭粉半兩夏採日乾桑螵蛸一分酥炙白龍骨半兩燒赤為末蓮花鬚二分右為末入前膏子搜為丸如梧桐子大空心鹽湯溫酒下三十丸如丸不就即用酒麵糊為之青娥丸治腎氣虛弱腰痛俯仰不利祕精大益陽事老人服此顔色還童少年服此行步如飛破故紙十兩以水淘過用香油炒如膩腑虛泠麥麩炒杜仲五兩須是六兩方得五兩銼如骰子大麥麩炒黃色胡桃仁五十個以糯米粥相拌臼內搗五六百下只用此粥為丸右丸如梧桐子大每服三十丸空心鹽酒下此方趙進道從廣州太守處得之久服大有神效遂作詩一絶以紀其功十年辛苦走邉隅造化工夫信不虛奪得風光歸掌內青娥不笑白髭鬚服椒法書林陳煜括為之歌青城山老人服椒得妙訣年過九十餘貌不類期耋再拜而請之欣然為我説蜀椒二斤淨揀去梗核及閉口者淨稱解鹽六兩潔其色青白龜背者良研細糝鹽慢火煮煮透滚菊末糝鹽在椒上用滚湯炮過椒五寸許經宿以銀石器慢火煮止留椒汁半盞掃乾地鋪淨紙傾椒在紙上覆以新盆封以黃土經宿取置盆內將乾菊花末六兩拌滚令勻更灑所餘椒汁然後攤於篩子內朗乾菊須花小色黃葉厚莖紫氣香味甘名曰甘菊蕊可作羹者為真隂乾為末初服十五圓早晚不可輟每月漸漸增纍之至二百初服之月早十五粒晚如之次月早晚各二十粒第三月增十粒至二百粒止鹽酒或鹽湯任君意所啜服及半年間胸膈微覺塞每日退十圓還至十五粒俟其無礙時數服如前日服半年後覺胸膈間撗塞如有物礙即每日退十粒退至十五粒止俟其無礙所服仍如前常令氣熏蒸否則前功失須終始服之令椒氣早晚熏蒸如一日不服則前功俱廢矣飲食蔬果等并無所忌節一年效即見容顔頓悅澤目眀而耳聰鬚烏而髮黑補腎輕腰身固氣益精血椒溫鹽亦溫菊性去煩熱四旬方可服服之幸毋忽逮至數十年功與造化埒耐老更延年不知幾嵗月四十嵗方可服若四十嵗服至老只如四十嵗人顔容此其驗也嗜欲若能忘其效尤卓絶我欲世人安作歌故怛切服狶蘞法狶蘞俗名火忺草春生苗葉秋初有花秋末結實近世多有單服者云甚益元氣蜀人服之法五月五日六月六日九月九日採其葉去根莖花實淨洗曝乾入甑中層層灑酒與蜜蒸之如此九過則已氣味極香美熬搗篩蜜元服之云治肝腎風氣四肢麻痺骨間疼腰膝無力亦能行大腸氣張乖崖詠進表云誰知至賤之中乃有殊常之效臣喫至百服眼目輕明至千服髭鬢烏黑筋力較健效驗多端陳書林經驗方敘述甚詳療諸疾患各有湯使今人採服一就秋花成實後和枝取用灑酒蒸曝杵臼中舂為細末煉蜜為丸以服之婦人小兒食治方陳令尹書精細狠好處在食治諸方然老人晚景兒孫眷輯團欒侍奉諸婦妊娠望得雄之喜諸孫襁褓快含飴之樂其間或有疢疾者在目前豈不縈懷余疇昔聞見所抄有婦人小兒食治諸方用之良驗今附益於編末亦以資耆英間覽且以備用云血氣諸方地黃粥治婦人血氣不調生地黃汁二合粟米一合粳米一合訶黎勒炮去核為末半兩鹽花少許右以水三升先煮二米將熟次入訶黎勒末地黃汁鹽花攪勻煮令稀稠得所分二服豬肚粥治婦人腹脅血癖氣痛衝頭面熻熻嘔吐酸水四肢煩熱腹脹白术二兩檳榔一枚生薑一兩半切炒右三味粗搗篩以豬肚一枚治如食法去涎滑納藥於肚中縫口以水七升煮肚令熟取汁入搜米及五味同煮粥空腹食之羊肉麵碁子治婦人血氣癖積臟腑疼痛泄㵼小麥麵四兩肉豆䓻去榖為末畢撥為末胡椒為末蜀椒去目并閉口炒出汗各一錢末右五味拌勻以水和作碁子用精羊肉四兩細切炒令乾下水五升入蔥薤白各五莖細切依常法煮肉以鹽醋調和候熟濾去肉將汁煮碁子空腹熱食之豬腎碁子治婦人血積久憊冷氣心腹常疼小麥麵四兩良薑末茴香末肉蓯蓉去皮炙為末蜀椒各一錢末獖豬腎一對去脂膜切如菉豆大右六味除腎外以水切作碁子先將腎以水五碗煮次入蔥薤白各少許候腎熟以五味調和如常法入藥碁子再煮令熟分三次空腹食之半夏撥刀治婦人痃癖血氣口吐酸水大麥麵四兩半夏湯洗去滑盡炒半兩為末桂去粗皮一錢為末右三味同以生薑汁并米醋少許和切作撥刀熟煮如常法空心食之妊娠諸病麥門冬粥治妊娠胃反嘔逆不下生麥門冬去心淨洗切碎研爛絞汁取一合白粳米淨淘二合薏苡仁揀淨去土一合生地黃肥者四兩淨洗切碎研爛絞汁三合生薑汁一合右以水三盞先煮煎粳米薏苡仁二味令百沸次下地黃麥門冬生薑三味汁相合煎成稀粥空心溫服如嘔逆未定晚後更煮食之生地黃粥治妊娠下血漏胎生地黃汁一合糯米淨淘一合右先將糯米煮作粥熟後下地黃汁攪調勻服之每日空腹服陳橘皮粥治妊娠冷熱氣痛連腹不可忍陳橘皮湯浸去白焙一兩苧麻根刮去土曝乾一兩良薑末三錢白粳米擇淨半合右四味除粳米外搗羅為散每服五錢匕先以水五盞煎至三盞去滓入粳米半合鹽一錢煮作粥食之空心一服至晚更一服豉心粥治諸種瘧疾寒熱往來豆豉心二合以百沸湯泡細研柴葫去苗二錢末桃仁湯浸去皮尖研三十個右先將豆豉心桃仁以白米三合水半升同煮為粥臨熟入茈葫末攪勻食之阿膠粥治妊娠胎動不安阿膠一兩搗碎炒令黃燥搗為末糯米右先將糯米煮粥臨熟下阿膠攪勻溫食之鹿頭肉粥治妊娠四肢虛腫喘急脹滿鹿頭肉半斤蔓荆子去土一兩良薑茴香炒令香各半兩右四味除鹿肉外搗羅為末每服四錢匕先將水五盞煮鹿肉候水至三盞去肉下白米一合同藥末候米熟下五味調和得所分作三服一日食盡鯉魚粥治妊娠安胎鯉魚一尾治如食法糯米一合蔥二七莖細切豉半合右以水三升煮魚至一半去魚入糯米蔥豉煮粥食之蔥粥治妊娠數月未滿損動蔥三莖糯米三合右以蔥煮糯米粥食之如産後血運用之亦效竹􅅹粥治妊娠常若煩悶淡竹􅅹三合粟米三合右以水煮粟米成粥臨熟下竹􅅹更煎令稀稠得所溫食之苧麻粥治妊娠胎不安腹中疼痛宜常食生苧麻根一兩淨洗煮取汁二合白糯米二合大麥麵一合陳橘皮浸去白妙半兩末右四味以水同煮為粥令稀稠得所熟後入鹽少許平分作二服空腹熱食之鯉魚羮治妊娠傷動胎氣不安鮮鯉魚一頭理如食法黃芪銼炒當歸切焙人參生地黃各半兩蜀椒十粒炒生薑一分陳橘皮湯浸去白一分糯米一合右九味銼八味令勻細納魚腹中用綿褁合以水三升煮魚熟將出去骨取肉及取魚腹中藥同為羮下少鹽醋熱啜汁喫極效黃雞臛治妊娠四肢虛腫喘急兼嘔逆不下黃雄雞一隻去頭足及皮毛腸胃等洗淨去血脈於沸湯中掠過去腥水良薑一兩桑白皮刮淨銼一兩半黃耆揀銼一兩右四味銼後三味與雞同煮候雞熟去藥取雞留汁將雞細擘去骨將汁入五味調和入雞肉再煮令滋味相入了隨性食之不計早晚不妨别服藥餌雞子羮治妊娠胎不安雞子一枚阿膠炒令燥一兩右取好酒一升微火煎膠令消後入雞子并鹽一錢和之分作三服相次食之山芋麵治妊娠惡阻嘔逆及頭痛食物不下生山芋一尺於沙盆內研令盡以葛布絞濾過苧麻根一握去皮爛搗碎右研勻入大麥麵三兩和搜細切如碁子大於蔥薤羮汁內煮熟旋食之又方木瓜一枚大者切蜜二兩右二味於水中同煮令木瓜爛於沙盆內細研入小麥麵三兩搜令相入薄捍切為碁子每日空心用白沸湯煮強半盞和汁淡食之雞肉索餅治妊娠養胎藏及治胎漏下血心煩口乾丹雄雞一隻取肉去肚作臛白麵一斤右二味搜麵作索餅和臛任意食之雞子酒治妊娠血下不止雞子五個取黃右取好酒一盞同煎如稀餳頓服之未差更作服之以差為度小豆飲治妊娠漏胎血盡子死赤小豆半升蜀椒去目并閉口炒出汗十四枚烏雌雞一隻理如食法右三味以水二升同煮令熟取汁時時飲之未差更作服之蔥豉湯治妊娠傷寒頭痛豉一合蔥白一握去根切生薑一兩半右以水一大盞煮至六分去滓分二服産後諸病論曰妊娠者十月既足百骨皆坼肌肉開解然後能生百日之內猶名産母時人將調一月便為平復豈不謬乎若飲食失節冷熱乖理血氣虛損因此成疾藥餌不和更增諸病令宜以飲食調治為良鮑魚羮治産後乳汁不下鮑魚肉半斤細切麻子仁一兩半别研蔥白三莖切碎香豉半合别研右先將水三升煮魚肉熟後入後三味煮作羮任意食之豬蹄粥治産後乳汁不下母豬蹄一隻治如食法以水三盞煮取二盞去蹄王瓜根洗切木通銼碎漏蘆去蘆頭各一兩右四味除豬蹄汁外粗搗篩每服三錢匕以煮豬蹄汁二盞先煎藥至一盞半去滓入蔥豉五味等并白米半合煮作粥任意食之豬蹄羮治産後乳汁不下母豬蹄二隻淨洗銼木通一兩半銼作寸段右先將木通以水五升煎取四升去木通和豬蹄入五味如常法煮羮任意食又方豬蹄一具洗銼粳米一合淨淘右用不拘多少入五味煮作羮任意食作粥亦得牛肉羮治産後乳無汁牛鼻肉淨洗切作小片右用水煮爛入五味如常法煮作羮任意食之鹿肉臛治産後乳無汁鹿肉四兩洗切右用水三碗煮入五味作臛任意食之三肉臛治産後乳汁不下龜肉二兩洗切羊肉三兩洗切麞肉三兩洗切右用水不拘多少入五味煮為臛食之蘇麻粥治婦人産後有三種疾鬱冒則多汗汗則大便祕故難於用藥惟此粥最佳且穩紫蘇子大麻子二味各半合淨洗研極細用水再研濾汁二盞分二次粥啜右此粥不獨産後可服大抵老人諸虛久風祕皆得力嘗有一貴人母年八十四忽腹滿頭疼惡心不能食醫家供補脾進食治風清頭目藥數日疾益甚懇豫辨之豫曰誤矣此老人風祕藏府壅滯聚膈中則腹脹惡心不喜食至巔頭痛神昏如得藏府流暢諸疾悉去豫進此而氣泄下結糞如胡椒十餘少間通利諸證悉去許學士方茯苓粥治産後無所苦欲睡而不得睡白茯苓去黑皮取末半兩粳米一合右二味以米淘淨煮粥半熟即下茯苓末粥熟任意食之地黃粥治初産腹中惡血不下生地黃五兩搗絞汁三合生薑搗絞取汁二合粳米淨淘三合右先將米如常法煮粥臨熟下地黃及生薑汁攪令勻空服食之紫莧粥治産前後赤白痢紫莧葉細銼一握粳米三合右先以水煎莧葉取汁去滓下米煮粥空心食之立瘥滑石粥治産後小便不利淋澀滑石半兩别研瞿麥穗一兩粳米三合右以水三升先煎瞿麥取二升半濾去滓將汁入米煮如常粥將熟入鹽少許蔥白三寸方入滑石末煮令稀稠得所分作三度食之羊肉粥治産後七日後宜喫此粥白羊肉去脂膜四兩細切粳米淨淘三合生地黃汁三合桂去粗皮銼取末一分右以水煮肉并米熟後入地黃汁并桂末令得所以五味調和空心任意食之豬腎粥治産後寒熱狀如瘧豬腎粥方豬腎去脂膜細切一對香豉一合白粳米三合蔥三莖細切右四味以水三升煮豬腎豉蔥至二升去滓下米煮如常法以五味調和作粥食之未瘥更作黃雌雞飯治産後虛羸補益黃雌雞一隻去毛及肚腸生百合淨洗擇一果白粳米飯一盞右將粳米飯百合入在雞腹內以線縫定用五味汁煮雞令熟開肚取百合粳米飯和雞汁調和食之食雞肉亦妙黃雌雞羮治産後虛損黃雌雞一隻肥者理如食法蔥白五莖切粳米半升右三味依常法以五味調和為羮任意食之豬肚羮治産後積熱勞極四肢乾瘦飲食不生肌肉獖豬肚一件淨洗先以小麥煮令半熟取出肚細切令安一處黃耆銼碎半兩人參三分粳米三合蓮實銼碎一兩右以水五升煮豬肚入人參黃耆蓮實候爛濾去藥并肚澄其汁令清方入米煮臨熟入蔥白五味調和作粥任意食鯽魚羮治産後乳無汁鯽魚一斤蠐螬五個右依常法煮羮食後食之鯽魚鱠治産後赤白痢鯽魚一斤治如食法蒔蘿陳橘皮湯去白焙蕪荑乾薑炮胡椒各一錢為末右取鯽魚作鱠投熱豉汁中入鹽藥末攪調空腹食之脯雞糝治産後心虛忪悸遍身疼痛黃雌雞一隻去毛頭足腸胃淨洗以小麥兩合水五升煮雞半熟即取出雞去骨蜀椒去目并開口炒汗出取末錢茈葫去苗二錢乾薑末半錢粳米合右先取水再煮雞及米令爛入蔥薤椒薑茈葫末等次又入五味鹽醬煎熟任意食之豬腎臛治産後風虛勞冷百骨節疼其醴煩熱豬腎一對去脂膜薄切羊腎一對去脂膜薄切右以五味并蔥白䜴為臛處常食之不拘時冬瓜撥刀治産後血壅消渴日夜不止冬瓜研取汁三合小麥麵四兩地黃汁三合右三味一處搜和如常麵切為撥刀先將麞肉四兩細切用五味調和煮汁熟後却漉去肉取汁下撥刀麵煮令熟不拘多少任意食之煨豬肝治産後赤白痢腰腹疼痛不能下食豬肝四兩蕪荑末一錢右將豬肝薄切糝蕪荑末於肝葉上五味調和以濕紙裹煻灰火煨熟去紙食生藕汁飲治産後惡血不利壯熱虛煩生藕汁地黃汁各半盞蜜一匙淡竹葉一握切以水一盞半煎取汁半盞右四味同煎沸熟溫分三服日二夜一又方治婦人蓐中好食熱麵酒肉變成渴燥生藕汁生地黃汁各半盞右二味相和溫暖分為三服小兒諸病四米湯治小兒泄注粱米稻米黍米各三合蠟如半彈丸大右以東流水二升煮粱米三沸絞去滓以汁煮稻米三沸去滓用汁煮黍米三沸絞去滓置蠟於汁中候蠟消每服半合空心午後各一隨兒大小增減牡丹粥治小兒癖瘕病牡丹葉漏蘆去蘆頭決明子各一兩半雄豬肝去筋膜切研二兩右以水三升煎前三味去滓取一升半入豬肝及入粳米二合煮粥如常法空腹食之隨兒大小加減扁豆粥治小兒霍亂扁豆莖切焙一升人參二兩右以水三升先煮扁豆莖令熟下人參煎至二升去滓取汁煮粟米三合為粥與乳母食臨乳兒時先將去少許冷乳汁然後乳母常食此粥佳豬子肝治小兒久痢豬子肝一具右切作片炙熟空心食之雞子餌治小兒秋夏中暴冷忽下痢腹脹乍寒乍熱渴甚雞子二枚去殼胡粉半兩炒令黃黃蠟一棗大右先將黃蠟於銚子內微火上鎔次下雞子黃及胡粉調和候冷作餅與兒空心午後食之量兒大小增減牛乳飲治小兒􅎪牛乳一合生薑汁半合右於銀器中慢火同煎至六七沸一嵗兒飲半合仍量兒大小以意加減甘草豆方冬月小兒解諸熱毒老人亦宜服之大黑豆三升淨洗甘草三兩細銼右用水六升煮令爛熟時時以三五十顆與小兒食之汁亦可服又可用已煮過黑豆入香藥末和勻甑上蒸令香軟尤佳夀親養老新書卷四
