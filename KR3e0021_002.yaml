body:
  text: 壽親養老新書卷二元鄒鉉續編顔氏家訓曰夫所以讀書學問本欲開心明目利於行耳未知養親者欲其觀古人之先意承顔怡聲下氣不憚劬勞以致甘腝惕然慙懼起而行之也經史傳記述孝子順孫嘉言懿行聫篇纍牘不勝其紀今略舉數十條以激發夫人孝愛之心必有目之心之而興起者文公家禮曰凡子事父母婦事舅姑天欲明咸起盥潄櫛總具冠帶昧爽適父母舅姑之所省問父母舅姑起子供湯藥婦具晨羞供具畢乃退各從其事按內則曰子事父母婦事舅姑雞初鳴適父母舅姑之所及所下氣怡聲問衣寒燠疾痛苛癢而敬抑搔之怡悅也苛瘡也抑按也搔摩也溫公曰丈夫唱喏婦人道萬福問侍者夜來安否何如侍者曰安乃退其或不安節則侍者以告此即禮之晨省也出入則或先或後而敬扶持之先後隨時便也進盥少者奉槃長者奉水請沃盥盥卒授巾㮽承盥水者巾以帨手問所欲而敬進之所欲如下文饘酏之類柔色以溫之溫藉也承尊者必和顔色也饘酏粥也稠者為饘稀者為酏酒醴厚者為酒薄者為醴芼羮魚肉為羮芼之以菜菽麥蕡稻黍粱秫菽大豆也蕡麻也稻黍粱秫皆米也唯所欲隨所愛棗栗飴蜜以甘之飴餳也四者味皆甘堇荁枌榆免薧滫瀡以滑之堇與荁相類枌與榆相類四物新者曰免乾者曰薧滫溲也瀡滑也數者性皆滑脂膏以膏之脂膏亦類也角者曰脂無角曰膏二者皆肥而澤父母舅姑必嘗之而後退尊長舉箸子婦乃各退就食溫公曰藥物乃關身之切務人子當親自檢數調煮供進不可但委婢僕脫若有誤即其禍不測晨羞俗謂點心易曰在中饋詩曰惟酒食是議凡烹調飲膳婦人之職也近年婦女驕倨皆不肯入庖厨今縱不親執刀七亦當檢校監視務令精潔劉氏曰問其意之所欲食者則敬順其心以進之和柔其色以溫之芬芳其意以奉之庶其親喜而不厭也孝子之事其親必養其志常使歡欣樂其子之能養曲禮曰凡為人子之禮冬溫而夏清昏定而晨省定安其牀衽也省問其安否如何溫公曰父母舅姑將寢則安置而退大夫唱喏婦人道安置此即禮之昏定也老萊子少以孝行養親年七十父母俱存著五色斑斕之衣為嬰兒戲於親側言不稱老為親取食上堂足跌而偃因臥地為嬰兒啼或弄雛於親側欲親之喜身老壽而雙親具慶亘古今鮮儷者也東漢黃香事父竭力致養暑則扇牀枕寒則以身溫席晉王延事親色養夏則扇枕席冬則以身溫被隆冬盛寒體常無全衣而親極滋味二人孝行甚相類也陳太丘詣荀朗陵貧儉無僕役乃使元方將車季方持杖從後長文尚少載著車中既至荀使叔慈應門慈明行酒餘六龍下食文若亦小坐著膝前於時奏真人東行兩家父子會聚之樂至矣哉陳實字仲弓為太丘長荀淑舉方正補朗陵侯相紀字元方實長子至德絶俗與實髙名並著而弟諶又配之每宰府辟召羔鴈成羣世號三君諶字季方淑有八子儉緄靖燾紝爽肅敖居西豪里縣令曰髙陽氏有才子八人署其里為髙陽里時人號曰八龍於時德星聚太史奏五百里賢人聚朱文公聚星亭畫屏贊云猗歟陳子神嶽鍾英文淵懿範道廣心平願言懷人曰我同志故朗陵君荀季和氏連峯對起麗澤潛滋愛而不見有黯其思薄言造之顧無僕役獨呼二兒駕豫以出青芻黃犢布幰柴車䇿紀前衛杖諶後趨所造伊何髙陽之里維時荀君聞至而喜顧謂汝靖往應於門七龍矯矯布席開尊靖肅而前翁拜其辱何誤斯晨得見清穆命爽行觴旅饋次陳獻酬交錯禮度情親載笑載言罔非德義益邁乃猷以輔斯世髧髦兩稚亦置膝前源深本固莫出匪賢崇臺回極於以占天猶曰茲野德星萃焉髙山景行好德所同課忠責孝獨概余衷有客詣陳太丘談鋒甚敏太丘乃令元方季方炊飯太丘問炊何遲留元方長跪曰君與客語乃具竊聽炊忘著箄今皆成糜太丘曰爾頗有所識否二子長跪俱説言無遺失太丘曰如此俱成糜自可何必飯邪王長豫為人謹順事親盡色養之孝丞相見長豫輒喜敬豫輒嗔長豫與丞相語常以謹密為端觀其親之喜愠則其子之為人可知矣悅字長豫導長子恬字敬豫導次子丞相導也王羲之牽諸子抱弱孫一味之甘割而分之以娛目前羲之生七子羲之又有之長凝之字子直第二子徽之字子猷最幼子獻之字子敬孫禎之徽之之子後周李遷哲除真州刺史其本州也男女六十九人緣漢十餘里第宅相次姬媵之有子者分處其中遷哲鳴笳導從往來其間縱酒歡宴子孫參見或忘其年名披簿以審之漢陸賈五男常乘安車駟馬從歌鼓瑟侍者十人約其子曰過汝汝給人馬酒食其往來擊鮮之樂未得如遷哲之子孫衆多唐郭子儀諸孫數十人每羣孫問安不盡辨頷之而已此可以為盛也子儀中書令二十四考壽八十五唐河東節度使栁公綽在公卿間最名有家法中門東有小齋自非朝謁之日每平旦輒出至小齋諸子仲郢皆束帶晨省於中門之北公綽決私事接賔客與公權及羣從弟再會食自旦至暮不離小齋燭至則命一人子弟執經史躬讀一過訖乃講議居官治家之法或論文或聽琴至人定鐘然後歸寢諸子復昏定於中門之北凡二十餘年未嘗一日變易公綽公權公諒兄弟三人公器公度其從兄弟也公綽一子四孫子仲郢孫璞圭璧玭公權字誠懸子仲憲孫缺玭字直清公綽子仲郢事公權如事公綽見公權未嘗不束帶為京兆尹出遇公權於道衢必下馬端笏立候公權過乃上馬公權莫歸必束帶迎候於馬首公權屢以為言仲郢終不以官達有小改公綽妻韓氏相國休之曽孫家法嚴肅儉約為縉紳家楷範常命粉苦參黃連熊膽和為丸賜諸子每永夜習學含之以資勤苦仲郢以禮律身居家無事常端坐拱手出內齋亦肅容束帶三為大鎮廄無良馬衣不薰香公退必讀書手不釋卷事事皆可法也栁玭曰崔山南昆弟子孫之盛鄉族罕比山南曽祖王母長孫夫人年髙無齒祖母唐夫人事姑孝每旦櫛縰笄拜於階下即升堂乳其姑長孫夫人不粒食數年而康寧一日疾病長幼咸萃宣言無以報新婦有子有孫皆得如新婦孝敬則崔之門安得不昌乎崔山南昆弟唐世系博陵第二房崔頲八子世比荀氏八龍琯字從律為山南西道節度張蒼口中無齒飲乳壽百餘嵗穢城有人年一百四十嵗不復能食榖飲曽孫婦乳見南史梁須蕭印傳東漢薑詩事母至孝妻奉順尤篤母好飲江水水去舍六七里妻常泝流而汲姑嗜魚鱠又不能獨食夫婦常力作供鱠呼鄰母共之舍側忽有涌泉味如江水每旦輒出雙鯉魚常以供二母之膳子婦同心竭力以致其養不易得也節孝徐先生事母謹嚴非有大故未嘗去其側日其太夫人所嗜或不獲即奔走闤市若有所亡人或慕其純孝損直以售之親戚故人或致甘毳誠不至禮不恭弗受也所奉饌皆手自調味太夫人飲食時先生率家人在左右為兒嬉或謳歌以説之故太夫人雖在窮巷而奉養與富貴家等無須臾不快也先生名積字仲車自兒童不為嬉戲寡言笑莊毅如成人事母太夫人篤孝朝夕冠帶問起居一日幞頭晨省外氏諸婦大笑之翌日復如是笑不已被笑旬日彌恪自是至老不廢童蒙訓云先生因具公裳見貴官忽自思云見貴官尚必用公裳豈有朝夕見母而不具公裳者乎遂晨夕具公裳揖其母先生應舉貢禮部不忍一日去其親遂徒步載母西入京師中進士第同榜第一人許安世率同年數十人拜太夫人於堂上仍以百千為太夫人壽數往返先生終拒之先生年過壯未娶或勉之答曰娶非人必為母病豫非敢忘嗣固有待也初從安定胡先生學潛心力行不復仕進其學以至誠為本積思六經而喜為文詞老而不衰政和六年諡節孝處士任元受事母盡孝母老多疾病未嘗離左右元受自言老母有疾其得疾之由或以飲食或以燥濕或以語話稍多或以憂喜稍過盡言皆朝暮候之無毫髮不盡五臟六腑中事皆洞見曲折不待切脈而後知故用藥必效雖名醫不逮也張魏公作都督欲辟之入幕元受力辭曰盡言方養親使得一神丹可以長年必持以遺母不以獻公也况能舍母而與公軍事邪魏公太息而許之程明道先生曰事親者不可以不知醫放翁曰先公守南都時有直祕閣張山者開封人判留司御史臺事年八十餘矣視聽步履飲食悉如少壯或問何術至此曰吾無他術但頃嘗遇異人授一藥服之數十年未嘗一日輟耳其法用香附子薑黃甘草三物同末之沸湯點晨起空心服三四錢名降氣湯以為人所以多疾病者多由氣不降故下虛而上實此藥能導之使歸下爾鄉人有效之者或返致虛弱蓋香附子薑黃㵼氣太甚而然不知山何以獨能取效如此意其别有它術特託此藥以罔人及渡江見一武官王升者亦七十餘矣康強無病問何所服藥則與山正同而後知人之於藥各有所宜不可強也祖光祿少孤貧性至孝常自為母炊爨作食王平北聞其佳名以兩婢餉之因取為中郎祖訥字士言能清言溫嶠薦為光祿大夫王乂字叔元為平北將軍吳隱之事母孝謹與太常韓康伯鄰居康伯母賢明婦人也謂康伯曰汝若居銓衡常舉如此輩人及康伯為吏部隱之遂階清級古人以孝行取人賢明之婦亦知此義吕侍講希哲言孝子事親須事事躬親不可委之使令也嘗説榖梁言天子親耕以供粢盛王后親蠶以供祭服國非無良農工女也以為人之所盡事其祖禰不若以己所自親者也此説最盡事親之道又説為人子者聽於無聲視於無形未嘗頃刻離親也事親如天頃刻離親則有時而違天天不可得而違也吕侍講字原明申國正獻公公著之長子正獻公居家簡重寡默不以事物經心而申國夫人性嚴有法度雖甚愛公然教公事事循蹈規矩甫十嵗祁寒暑雨侍立終日不命之坐不敢坐也日必冠帶以見長者平居雖甚熱在父母長者之側不得去巾襪縛袴衣服唯謹行步出入無得入茶肆酒肆市井里巷之語鄭衛之音未嘗一經於耳不正之書非禮之色未嘗一接於目內則正獻公與申國夫人教訓之嚴外則焦先生千之字伯強化導之篤故公德器成就大異衆人公嘗言人生內無賢父兄外無嚴師友而能有成者少矣司馬溫公曰凡諸卑幼事無大小毋得専行必咨稟於家長又曰凡子受父母之命必籍記而佩之時省而速行之事畢則返命焉或所命有所不可行者則和色柔聲具是非利害而白之待父母之許然後改之若不許苟於事無大害者亦當曲從若以父母之命為非而直行己志雖所執皆是猶為不順之子况未必是乎吳顧愷每得父書常掃灑几案舒書於上拜跪讀之每句應諾閲畢再拜得父之書猶拜跪而讀受父之命其敬佩而行當何如耶包孝肅拯字希仁始及第以親老侍養不仕宦且十年人稱其孝范忠宣純仁字堯夫再調官皆不赴文正公遣之公曰純仁豈可重於祿食而輕去父母邪雖近亦不能朝夕在側遂終養焉二公以事親為重以仕進為輕可法也王逢原思歸賦云吾父八十母髮亦素尚爾為吏敻焉遐路嗷嗷晨烏其子反哺我豈不如鬱其誰訴惟秋之氣憀栗感人日興愁思側睇江濵憶為童子當此凜辰百果始就迭進其珍時則有紫菱長腰紅芡圓實牛心緑蒂之柿獨包黃膚之栗青芋連區烏椑五出鴨腳受彩乎微核木瓜鏤丹而成質青乳之梨頳壺之橘蜂蛹淹鹺榠樝漬蜜膳羞則有鵁鶄野鴈澤鳬鳴鶉清江之膏蟹寒水之鮮鱗冒以紫薑雜以茭首觴浮萸菊爼薦菁韭坐溪山之松篁掃門前之桐栁僮僕不譁圖書左右或靜默以終日或歡言以對友信吾親之所樂安閭里其滋久切切余懷欲辭印綬固非效淵明之褊心耻折腰於五斗潘嶽間居賦云太夫人在堂覽止足之分庶浮雲之志築室種木逍遙自得池沼足以漁釣舂稅足以代耕灌園鬻蔬供朝夕之膳牧羊酤酪俟伏臘之資凛秋暑退熙春寒往微雨新晴六合清朗太夫人御板輿升輕軒逺覽王畿近周家園席長筵列子孫栁垂隂車結軌或宴於林或褉於汜昆弟斑白兒童稚齒稱萬夀以獻觴或一懼而一喜壽觴舉慈顔和浮杯樂飲絲竹駢羅頓足起舞抗音髙歌人生安樂孰知其他王潘二賦仕宦而志於事親者良可諷味黃山谷手書云王谹稚川元豐初調官京師寓家鼎州親年九十餘矣尚閲貴人家歌舞醉歸書其旅邸壁間云鴈外無書為客久蛩邊有夢到家多畫堂玉佩縈雲響不及桃源欵乃歌余訪稚川於邸中而和之詩曰五更歸夢常苦短一寸客愁無奈多慈母每占烏鵲喜家人應賦扊扅歌身如病鶴翅翎短心似亂絲頭緒多此曲朱門歌不得湖南湖北竹枝歌王稚川既得官都下有所盻忘歸余戲作林夫人欵乃歌二章與之竹枝歌本出三巴其流在湖湘耳欵乃湖南歌也詩曰花上盈盈人不歸棗下纂纂實已垂臘雪在時聽馬嘶長安城中花片飛從師學道魚千里蓋世成功黍一炊日月倚門人不見看盡林烏返哺兒四詩之作可謂盡朋友責善之義山谷至孝奉母安康君至為親滌虎子未嘗頃刻不供子職故錫類之意力勸稚川以歸侍云明道伊川二先生之母夫人候氏事舅姑以孝謹稱與太中公珦相待如賔客公賴其內助禮敬尤至而夫人謙順自牧雖小事未嘗専必稟而後行伊川曰先夫人候氏七八嵗誦古詩曰女子不夜出夜出秉明燭自是日暮則不復出房閣既長好文而不為辭章見世之婦女以文章筆札傳於人者則深以為非楊誠齋夫人羅氏年七十餘每寒月黎明即起詣厨躬作粥一釡遍享奴婢然後使之服役其子東山先生啓曰天寒何自苦如此夫人曰奴婢亦人子也清晨寒冷須使其腹中略有火氣乃堪服役耳東山曰夫人老且賤事何倒行而逆施乎夫人曰我自樂此不知寒也汝為此言必不能如吾矣東山守吳興夫人於郡圃種紵躬緝績以為衣時年八十餘矣東山月俸分以奉母夫人忽小疾既愈出所積劵曰此長物也今宜悉以謝醫則吾無事矣平居首飾止於銀衣止於紬絹生四子三女悉自乳曰飢人之子以哺吾子是誠何心哉其家采椽土階如田舍翁三世無增飾史良叔守廬陵官滿來訪入其門升其堂目之所見無非可敬可仰可師可法者所得多矣因命畫工圖之而去誠齋東山清介絶俗固皆得之天資而婦道母儀所助者亦多矣左傳文伯之母老而猶績文伯曰以歜之家而主猶績乎母曰王后親織玄紞公侯之夫人加以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事蒸而獻功男女效績愆則有辟古之制也羅鶴林大經云觀誠齋夫人乃知古今未嘗無列女未嘗無賢母籍溪胡氏宗系記序云吾家自上世以來事親從兄多以孝悌聞曽祖十四公有二兄雖已異居每事必先咨長兄次咨仲兄二兄不取而後取二兄許行而後行曽祖妣余太君感末疾十年不離牀席飲食起居梳沐盥潄便圊皆須人抱負扶掖子孫婦女左右奉事惟懼不如其意祖妣章太君妣余氏叔祖妣吳令人更互直侍衣不解帶目不交睫朝夕匪懈余太君常慰勞之曰吾無以報汝等天當以祐汝等吳令人果應福慶是生文定公登巍科厯顯任其立朝正色直言無所假借所以納忠君父之意雖死不忘憲昔侍文定居漳濵十五年見其躬事二親可謂盡之矣奮由白屋二親安樂享祿養者二十年皆生受官邑之封此人間所稀有令人慈母也通詩書達義理愈顔柔色以事之不足以為難中大公嚴毅豪勇不可少犯文定所以事之者未始徇其意每每以正道開説中大久而益親信之有晚生兒女三人初以為慮文定視之如一嫁幼妹與己女裝遣奩具無少異中大臨終以二荆授文定曰二弟若不才為汝之羞可嚴教之文定泣對曰誓不忍撻之其後循循然誘以學術迪以道義立身婚宦皆克有成立至使一家蒸蒸雖婦女兒童咸知恭順之道實由文定躬行之化所及也孔子曰人之行莫大於孝有子曰孝悌也者其為仁之本歟後代子孫當務勉行孝悌以無忝所生庶幾門風益振家聲不墜豈不善哉胡文定公安國字康侯仕至給事中二弟長安止仕至郡倅次安老仕至知州三子長致堂寅字明仲仲五峯宏字仁仲季寧籍溪憲字原仲仕至祕書省正字西園大壯字季履五峯第三子元魏楊播家世純厚並敦義讓昆季相事有如父子椿津恭謙兄弟旦則聚於廳堂終日相對未曽入內有一美味不集不食廳堂間往往幃幔隔障為寢息之所時就休偃還共談笑椿年老曽他處醉歸津扶持還至假寢閣前承候安否椿津年過六十並登台鼎而津常旦暮參問子姪羅列階下椿不命坐津不敢坐椿每近出或日斜不至津不先飯椿還然後共食食則津親授匙筯味皆先嘗椿命食然後食津為肆州椿在京宅每有四時嘉味輒因使次附之若或未寄不先入口一家之內男女百口緦服同㸑庭無間言楊播字延慶事元魏孝文帝為平東將軍椿字延壽位至司徒津字羅漢為司空椿津俱事明太后椿嘗戒子孫云吾兄弟在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者三不忍别食也聞汝兄弟時有别齋獨食者又不如吾一世也又云仕魏以來髙祖而下七郡守三十二刺史內外顯任少比司馬溫公與其兄伯康友愛尤篤伯康年將八十公奉之如嚴父保之如嬰兒每食少頃則問曰得無飢乎天少冷則拊其背曰衣得無薄乎范忠宣知襄城縣承事伯兄照管湯藥飲食居處衣服必躬必親如孝子之事嚴父事親從兄仁義之實愛敬之理與生俱生仁之至義之盡也溫公耆英真率會約序齒不序官為具務簡素朝夕食各不過五味菜果脯醢之類各不過三十器酒巡無算深淺自斟主人不勸客亦不辭逐巡無下酒時作菜羮不禁召客共用一簡客注可否於字下不别作簡或因事分簡者聽會日早赴不待促違約者每事罰一巨觥公自序其詩云作真率會伯康與君從七十八嵗安之七十七嵗正叔七十四嵗不疑七十三嵗叔達七十嵗光六十五嵗合五百一十嵗口號成詩用安之前韻伯康溫公之兄君從席汝言安之王尚恭正叔楚達中不疑王謹言七人五百有餘嵗同醉花前今古稀走馬鬭雞非我事紵衣絲髮且相輝經春無事連翩醉彼此往來能幾家切莫辭斟十分酒儘從他笑滿頭花南陽劉驎之為桓沖長史沖嘗至驎之家驎之方條桑謂沖使君既枉駕宜先詣家君沖詣其父父命乃還拂短褐與沖言父使驎之自持濁酒葅菜供賔沖敕人代之父辭曰若使官人則非野人意也德星之聚慈明行酒六龍下食宋胡侍講瑗治家甚嚴閨門整肅尤謹內外之分諸子常侍立左右賔至則供億茶湯待客不用使令而以子弟禮度􅈺雅杜子美詩亦有問答未及己兒女羅酒漿之句橫渠先生曰若親之故舊所喜當極力招致賔客之奉當極力營辦務以悅親不可計家之有無然又須安之不知其勉強勞苦苟使見其為而不易則亦不安矣唐張士嚴父病藥須鯉魚冬月氷合有獺䘖魚至前得以供父父遂愈宋查道字湛然歙州人母病思鱖魚羮方冬苦寒道泣祝於河鑿氷脫巾以取之得鱖尺許以饋母疾尋愈孝感之事無世無之孟宗得筍之事尤竒陳遺之鐺底飯蔡順之異器椹尤於患難中得力真西山參政性篤孝為母吳夫人祈福詞云天下之樂莫如以祿之及親人子之情尤欲其親之難老母疾愈醮謝詞云莫親乎母實為命以相依蓋髙者天惟盡誠而可動願損臣身之算以延母氏之齡爐薰之燼未銷囊藥之功已應孝行之簡在帝心若此為人子者可不敬諸應璩古樂府云昔有行道人陌上見三叟年各百餘嵗相與鋤禾莠住車問三叟何以得此壽上叟前置辭量腹節所受中叟前置辭室內嫗粗醜下叟前置辭暮臥不覆首要哉三叟言所以能長久晦翁語録或云俗語夜飯減一口活得九十九先生曰此出古樂府三叟詩唐栁公度年八十有強力人問其術對曰吾平生未嘗以脾胃熟生物暖冷物不以元氣佐喜怒耳此下十數條述老人所以觀頤自養者富鄭公年八十書座右云守口如瓶防意如城張廷老名珙年七十餘步趨拜起健甚自言夙興必拜數十老人氣血多滯拜則支體屈伸氣血流暢可終身無手足之疾唐仲俊年八十五六極康寧自言少時因讀千字文有所悟謂心動神疲四字也平生遇事未嘗動心故老而不衰太醫孫君昉字景初自號四休居士山谷問其説四休笑曰粗茶淡飯飽即休補破遮寒暖即休三平二滿過即休不貪不妬老即休山谷曰此安樂法也夫少欲者不伐之家也知足者極樂之國也四休家有三畝園花木鬱鬱客來煮茗談上都貴遊人間可喜事或茗寒酒冷賔主皆忘其居與余相望暇則步草徑相尋故作小詩遣家僮歌之以侑酒茗詩曰太醫診得人間病安樂延年萬事休又曰無求不著看人靣有酒可以留人嬉欲知四休安樂法聽取山谷老人詩山谷四印云我提養生之四印君家所有更贈君百戰百勝不如一忍萬言萬當不如一默無可簡擇眼界平不藏秋毫心地直我肱三折得此醫自覺兩踵生光輝團蒲日靜鳥吟時爐薰一炷試觀之四休四印老少富貧普同受用東坡云舊説南陽有菊水水甘而芳居民三十餘家飲其水皆壽或至百二三十嵗蜀青城山老人村有見五世孫者道極嶮逺生不識鹽醯而溪中多枸杞根如龍蛇飲其水故壽道人中往往多有耆壽者陸放翁云青城山上官道人此人也巢居食松麵年九十矣人有謁之者但粲然一笑有所請問則託言病聵一語不肯答豫嘗見之於丈人觀道院忽自語養生曰為國家致太平與長生不死皆非常人所能且當守國使不亂以待竒才之出衛生使不天以須異人之至不亂不天皆不待異術惟謹而已豫大喜從而叩之則已復言聵矣放翁又云老葉道人龍舒人不食五味年八十七八平生未嘗有疾居會稽舜山天將寒必增屋瓦補墻壁使極完固下帷設簾多儲薪炭杜門終日及春乃出對客莊敬不肯多語豫每訪之殊無它語一日默作意欲叩其所得才入門即引入臥內燒香具道其遇師本末若先知者亦異矣夫旴江有日峯丘道人號河南子年九十餘皓髮朱顔冬夏一單衣雨雪不張蓋叔祖西巖寺丞招之來泰寧留十餘載擕一道籃繫一小牌子上書詩四句云老遲因性慢無病為心寬紅杏難禁雨青松耐嵗寒常跣足賣卜於市得錢則散與小兒兒爭拾之黃玉窗與二三友扣問功名皆笑而不言獨指玉窗云子壽髙嘗問養生之術但指小牌子上詩四句眠焉今厯五十餘年信知其言之有味也太乙真人七禁文其六曰美飲食養胃氣彭鶴林耜云夫脾為臟胃為腑脾胃二氣互相表裏胃為水榖之海主受水榖脾為中央磨而消之化為血氣以滋養一身灌溉五臟故修生之士不可以不美其飲食所謂美者非水陸畢備異品珍羞之謂也要在乎生冷勿食塵硬勿食勿強食勿強飲先飢而食食不過飽先渴而飲飲不過多以至孔氏所謂食饐而餲魚餒而肉敗不食等語凡此數端皆損胃氣非惟致疾亦乃傷生欲希長年此宜深戒而亦養老奉親與觀頤自養者之所當知也黃山谷云爛蒸同州羔灌以杏酪食之以匕不以筯南都撥心麵作槐芽溫淘糝以襄邑抹豬炊共城香稻薦以蒸子鵝吳興庖人斫松江鱸鱠繼以廬山康王谷水烹曽坑鬭品少焉解衣仰臥使人誦東坡赤壁前後賦亦足以一笑也此雖山谷之寓言然想像其食味之美安得聚之以奉老人之旨甘東坡老叨賦云庖丁鼓刀易牙烹熬水欲新而釡欲潔火惡陳而薪惡勞九蒸暴而日燥百上下而湯塵嘗項上之一臠嚼霜前之兩螯爛櫻珠之煎蜜滃杏酪之蒸羔蛤半熟以含酒蟹微生而帶糟蓋聚物之夭美以養吾之老叨婉彼姬薑顔如李桃彈湘妃之玉瑟鼓帝子之雲璈命仙人之蕚緑華舞古曲之鬱輪袍引南海之玻璃酌涼州之蒲萄願先生之耆壽分餘􅅹於兩髦候紅潮於玉頰驚暖響於檀槽忽纍珠之妙曲抽獨繭之長繅閔手倦而少休疑吻燥而當膏倒一缸之雪乳列百柁之瓊艘各眼灧於秋水咸骨碎於春醪美人告去已而雲散先生方兀然而禪逃饗松風於蟹眼浮雪花於兔毫先生一笑而起渺海濶天而髙苕溪漁隱曰東坡於飲食作詩賦以寫之往往皆臻其妙如老叨賦豆粥詩是也豆粥詩云江頭千頃雪色蘆茅簷出沒晨煙孤地碓舂粳光似玉沙瓶煮豆軟如酥我老此身無著處賣書來問東家住臥聽雞鳴粥熟時蓬頭曵履君家去又寒具詩云纎手搓來玉數尋碧油煎出嫩黃深夜來春睡無輕重壓褊佳人纒臂金寒具乃捻頭也出劉禹錫佳話過子忽出新意以山芋作玉糝羮色香味皆竒絶天酥陀則不可知人間決無此味也詩云香似龍涎仍釅白味如牛乳更全清莫將北海金虀鱠輕比東坡玉糝羮誠齋菜羮詩亦云雲子香抄玉色鮮菜羮新煮翠茸纎人間膾炙無此味天上酥陀恐爾甜宋太宗命蘇易簡講文中子有楊素遺子食經羮藜含糗之説上因問食品何物最珍對曰物無定味適口者珍臣止知虀汁為美臣憶一夕寒甚擁爐痛飲夜半吻燥中庭月明殘雪中覆一虀盂連咀數根臣此時自謂上界仙厨鸞脯鳯胎殆恐不及屢欲作氷壺先生傳紀其事因循未果也上笑而然之唐劉晏五鼓入朝時寒中路見賣蒸胡處熱氣騰輝使人買以袍袖包裙褐底啖謂同列曰美不可言此亦物無定味適口者珍之意也倪正父思云魯直作食時五觀其言深切可謂知慙愧者矣余嘗入一佛寺見僧持戒者每食先淡喫三口第一以知飯之正味人多以五味雜之未有知正味者若淡食則本自甘美初不假外味也第二思衣食之從來第三思農夫之艱苦此則五觀中已備其義每食用此為法極為簡易且先喫三口白飯已過半矣後所食者雖無羮蔬亦自可了處貧之道也又云造物勞我以生逸我以老少年不勤是不知勞也年老奔馳是不知逸也天命我逸而我自勞可乎又曰吾鄉有前輩三人其一施大任參政享年九十有四其一李季叔參政享年八十有一其一沈持要詹事今年已八十有二耳目聰明步履輕捷夜書細字三賢難老皆以絶欲早故效驗彰彰如此然則欲求長年可不以為法乎倪正父經鉏堂雜志述五事云靜坐第一觀書第二看山水花木第三與良朋講論第四教子弟第五述齊齋十樂云讀義理書學法帖字澄心靜坐益友清談小酌半醺澆花種竹聽琴玩鶴焚香煎茶登城觀山寓意奕棋雖有他樂吾不易矣劉後村云外舅林寶章瑑晚嵗奉祠舊廬略繕葺小圃粗種藝體中佳時幅巾短褐野眺露坐悠然忘歸二子公遇公選朝夕侍公跬步不離家庭講肄偶有會意公輒喜曰天下至樂不出閨門之內公遇兄弟安隱約習苦淡耆年一燈熒然語必達旦至言妙義不緣師授亦非言語文字可傳公遇號寒齋二子同字子真合字子常守寒齋孝友之規子常事兄如父家政聽焉子真亦極友愛連牀之語至曙一膳之珍必剖制行同孝謹臨財同亷讓讀書同義趨作文同機鍵奕世傳一心百年如一日父子兄弟自為師友世未有如林氏家庭講肄之樂者也鶴林羅大經云余家深山中每春夏之交蒼蘚盈階落花滿徑門無剝啄松影參差禽聲上下午睡初足旋汲山泉拾松枝煮苦茗啜之隨意讀周易國風左氏傳離騷太史公書及陶杜詩韓蘇文數篇從容步山徑撫松竹與麛犢共偃息於長林豐草間坐弄流泉潄齒濯足既歸竹窗下山妻稚子作笋蕨供麥飯欣然一飽弄筆窗間隨大小作數十字展所藏法帖墨迹畫卷縱觀之興到則吟小詩或草玉露一兩段再烹苦茗一杯出步溪邊邂逅園翁溪友問桑麻説粳稻量晴校雨探節數時相與劇談一餉歸而倚杖柴門之下則夕陽在山紫緑萬狀變幻頃刻悅可人目牛背笛聲兩兩來歸而月印前溪矣唐子西詩云山靜似太古日長如小年玩味此句最妙然識其妙者蓋少彼牽黃臂蒼馳獵於聲利之場者但見衮衮馬頭塵匆匆駒隙影耳人能真知此妙則東坡所謂無事此靜生一日是兩日若活七十年便是百四十所得不已多乎易曰觀頤觀其自養也康節詩云老年軀體素溫存安樂窩中别有春盡有山翁拙於用也能康濟自家身此自養之旨也善自養如鶴林斯可以佚老矣邵康節先生年老逢春吟云年老逢春雨乍晴雨晴况復近清明天低宫殿初長日風暖園林未轉鶯花似錦時髙閣望草如茵處小車行東君見賜何多也又復人間久太平凡八首首尾吟云堯夫非是愛吟詩詩是堯夫喜老時明著衣冠為士子髙談仁義作男兒敢於世上明開眼肯向人前浪皺眉六十七年無事客堯夫非是愛吟詩凡十一首惜芳菲吟云緑楊隂裏尋芳遍紅杏香中帶醉歸末聫云芳樽有酒慈親樂猶得階前戲綵衣凡四首擊壤集一編老人怡神悅目時可吟玩無名公傳自敘尤詳性喜飲酒命之曰太和湯所飲不多不喜過醉其詩曰飲微酡口先吟哦吟哦不足遂及浩歌所寢之室謂之安樂窩冬燠夏涼遇有睡思則就枕其詩曰墻髙於肩室大如斗布被暖餘藜羮飽後氣吐胸中充塞宇宙聞人言人之善就而和之又從而喜之其詩曰樂見善人樂聞善事樂道善言樂行善意聞人之善如佩蘭蕙晚有二子教之以仁義授之以六經家素業儒口未嘗不道儒言身未嘗不道儒行其詩曰羲軒之書未嘗去手堯舜之談未嘗離口當中和天同樂易友吟自在詩飲歡喜酒百年升平不為不偶七十康強不為不壽夫老境從容善於自養孰有如康節翁者乎吕東萊伯恭橫山吳氏佚老庵記云橫山吳君珉治别室之西偏榜以佚老休工歸役斤釡收聲輯杖立於前聞竊語於階者曰棊隴繩畦坻粟京稼籌算挂壁萬貨四臻此吾主人翁所以佚其老也少進至於門聞行語於塗者曰豐林邃宇樽爼靖嘉鷗鷺不驚風月相答此吾豪長者所以佚其老也又進至於郊聞聚語於孰者曰培嗣以學既楙既敷秩壺以禮既序既飭此吾鄉丈人所以佚其老也他日吳君為道之豫曰夫三者之言何如吳君曰階得吾粕塗得吾漓孰得吾醇出浸逺吾名吾室義其究於此乎豫曰未既也畏嶠登輿身間心栗厭市築墉目靜耳喧君雖善自佚踰闑以往肩頳腹枵者踵相接嵗或不升尫瘠困憊呻吟交於大逵専一室之佚樂乎哉君里中望也盍勸族黨愒勞振乏己責紓逋同其美於是鄉則盡橫山表裏皆吾佚老庵也其視尺椽半席廣狹何若君謝曰厚矣子之拓吾境也顧童奴陷其説於壁間以勸此記為勉耆英力行好事斂嵗濟賑實積隂功必有紫府真人延之於上坐者辛稼軒詞壽趙茂中郎中時以置兼濟倉里中賑濟除直祕閣沁園春云甲子相髙亥首曽疑絳縣老人看長身玉立鶴般風度方頤鬚磔虎樣精神文爛卿雲詩凌鮑謝筆勢駸駸更右軍渾餘事羡仙都夢覺金闕名存門前父老欣欣換奎閣新褒詔語溫記他年帷幄須依日月只今劔履快上星辰人道隂功天教多壽看到貂蟬七葉孫君家裏是幾枝丹桂幾樹靈椿又呈茂中前章記廣濟倉事滿江紅云我對君侯長怪見兩眉隂德更長夢玉皇金闕姓名仙籍舊嵗炊煙渾欲斷被公扶起干人活算胸中除却五車書都無物溪左右山南北花園近雲朝夕看風流杖屨蒼髯如戟種栁已成陶令宅散花更滿維摩室勸人間且住五千年如金石趙龍圖自詠念奴嬌云吾今老矣好歸來了取青山活計甲子一周餘半紀諳盡人間物理婚嫁隨緣田園粗給知足生慚愧心田安逸自然綽有餘地還是初度來臨葛巾野服不減貂蟬貴門外風波煙浪惡我已收心無纍弟勸兄酬兒歌女舞樂得醺醺醉滿堂一笑大家百二十嵗辛稼軒壽人七十感皇恩云七十古來稀人人都道不是隂功怎生到松姿雖瘦偏耐雲寒霜冷看君霜鬢底青青好樓雪初晴庭闈嬉笑一醉何妨玉壺倒從今康健不用靈丹仙草更有一百嵗人難老又為嬸母王氏慶七十感皇恩云七十古來稀未為稀有須是榮華更長久滿牀靴笏羅列兒孫新婦精神渾似箇西王母遙想畫堂兩行紅袖妙舞清歌擁前後大男小女逐箇出來為壽一箇一百嵗一杯酒最髙樓詩洪內翰七十云金閨老眉壽正如川七十且華筵樂天詩句香山裏杜陵酒債曲江邊問何如歌窈窕舞嬋娟更十嵗太公方出將又十嵗武公方入相留盛事看明年直須腰下添金印莫教頭上欠貂蟬向人間長富貴地行仙鵲橋仙為人慶八十席間戲作云朱顔暈酒方瞳點漆間傍松邊荷杖不須更展畫圖看是箇壽星模樣今朝盛事一杯深勸更把新詞齊唱人間八十最風流長貼在兒兒額上又為嶽母慶八十云八旬慶會人間盛事齊勸一杯春釀胭脂小事點眉間猶記得舊時宫樣綵衣更著功名富貴直過太公以上大家著意記新詞遇著箇十年便唱品令族姑慶八十來索俳語更休説便是箇住世觀音菩薩甚今年容貌八十嵗見底道才十八莫獻壽星香燭莫祝靈龜椿鶴只消得把筆輕輕去十字上添一撇張于湖孝祥帥潭州日壽黃倅永存母淑人木蘭花云慈闈生日見説今年年九十戲綵盈門大底孩兒七箇孫人間盛事只這一般難得似願我雙親都似君家太淑人曽祖參政文靖公壽伯母太夫人上官氏木蘭花詞云吾家二老前有髙平生癸卯若到今辰詎止榮華九十齡共惟伯母九十新年還又五五五相承好看重逢乙巳春上官氏朋溪寧國府判夢得朴庵編修户部提刑應傳之母髙平郡夫人江氏文靖公之祖母皆年過九十吾家二壽母也又有鷓鴣天二闋云九十吾家兩壽星今夫人賽昔夫人百年轉眼新開帙十月循環小有春十月二十一日生生日到轉精神目光如鏡步如雲年年長侍華堂宴子子孫孫孫又孫壽母開年九十三佳辰就養大江南緹屏晃耀新寧國繡斧斕斑老朴庵傾玉斚擘黃柑兩孫垂綬碧於藍便當刋頌崆洞頂留與千年作美談文靖公在朝日壽母昌國葉夫人詞云帝里風光别是天花如錦繡栁如煙還逢令節春三二又慶慈闈嵗八千斟壽斚列長筵子孫何以詠髙年各裒千首西湖什一度生朝獻一篇任靜江經略安撫日元夕奉親出郊詞云綵結輕車五馬隨傾城爭出看花枝笙歌十里巖前去燈火千門月下歸蓮炬引老萊衣蛾眉無數捲簾窺誰知萬里逢燈夕却勝尋常三五時壽母詞云滿二望三時中春三十日生春景方明媚又見蟠桃結子來王母初筵啓無數桂林山不盡灕江水總入今朝祝壽杯永保千千嵗朴庵編修户部知平江府日夀母上官太夫人感皇恩云覔得箇州兒稍供綵戲多謝天公為排備一輪明月醖作清亷滋味傾入壽杯裏何妨醉我有祿書呈母年萬計八十三那裏暨便和兒算恰一百四十地這九千餘嵗長隨侍鷓鴣天云天遣豐年祝母齡人人安業即安親探支十日新陽福來獻千秋古佛身兒捧盞婦傾瓶更欣筵上有嘉賔紫駝出釡雙臺餽玉節升堂兩使星家居日鷓鴣天壽詞云諸佛林中女夀星千祥百福産心田喜歸王母初生地滿勸麻姑不老泉吾夢佛半千員一年一佛護庭萱數過九十從頭數四百餘零一十年序云十月二十一日吾母太淑人生日也今年九十仰荷乾坤垂佑賜以福壽康寧願益加景覆令其耳目聰明手足便順五臟六腑和氣流通常獲平安之慶子孫賢順寸祿足以供甘旨也黃玉窗祖母張氏壽八十有三乃翁怡軒居士賦詞有八十加三迎九十還似嬰童之句其居與朴庵對門朴庵聞之喜曰吾仁鄰亦有壽母如此耶怡軒慶母年開九帙詩云又見梅粧碧玉枝弟兄相聚著萊衣西方佛慶明朝誕南極星騰壽日輝百嵗阿㜷開九帙兩房孫子戲重闈年年得侍髙堂醉坐對天花散漫飛劉隨如鎮壽趙路分八十嵗感皇恩云八十最風流那誰不喜况是精神可人意太公當日未必榮華如此兒孫列兩行萊衣戲好景良辰滿堂和氣唱箇新詞管教美願同彭祖尚有八百來嵗十分才一分那裏暨此詞亦用那裏暨三字蓋本於康伯可之詞程滄洲壽後溪劉侍郎云朱顔白髮炯雙瞳一念平生造物通內閣圖書真學士西園几杖老仙翁木公金母人間現桂子桐孫壽籍同遙想綵衣圍四世後溪無日不春風姚狀元賦吕氏宜老堂云此堂清不著珠璣只要雙親佚老宜春酒儘堪眉壽介斑衣長似乳時嬉婦垂鶴髮陪姑緯翁撚銀髯課子詩飽飲菊花潭上水雞窠猶自拜孫枝二詩貴華富艷人間至樂孰加焉李守為承旨奉使南海至瓊道逢一翁自稱楊遐舉年八十一其叔父皆年一百二十餘又見其祖宋卿年九十五次見雞窠中有小兒出頭下視宋卿曰此九代祖也不語不食不知其幾嵗矣唐九老圖白樂天詩序云胡杲年八十九吉旻年八十八劉真年八十七鄭據年八十五盧直年八十三張渾年七十七居易年七十七於東都履道坊合尚齒之會七老相顧既醉且歡靜而思之此會希有因各賦七言韻詩一章以記之樂天詩云七人五百八十四拖紫紆朱垂白鬚囊裏無金莫嗟嘆樽中有酒且歡娛吟成六韻神還旺飲到三杯氣尚粗嵬峩狂歌教婢拍婆娑醉舞遣孫扶天年髙邁二踈傳人數多於四皓圖除却三山五天竺人間此會且應無或傳諸好事者有二老年貌絶倫同歸故鄉亦來斯會洛中遺老李元爽年一百三十六禪僧如滿歸洛年九十五皆年之尤髙者也續命書姓名年齒寫其形貌附於圖右樂天贈之詩云雪作鬚眉雲作衣遼東華表暮雙歸當時一鶴尤希有何況今逢兩令威宋洛陽耆英會文潞公七十七留守西都富韓公年七十九致政在里第二公弼亮三朝為國元老與席司封汝言等於韓公之第買酒相樂賔主十有二人圖於妙覺僧舍司馬溫公年未七十亦與焉潞公命溫公序其事諸公皆有詩溫公詩云洛下衣冠愛惜春相從小飲任天真隨家所有自可樂為具更微誰笑貧不待珍羞方下筯只將佳景便娛賔庾公此興知非淺藜藿終難作主人潞公請老致仕後再起平章軍國重事制書云吕望惟賢起佐文王之治周公已老留為孺子之師繼而請老復以太師致仕年九十二壽獨髙於諸公云壽親養老新書卷二
